<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>可樂旅遊－迪士尼探險號旅遊手冊</title>
    
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/turn.js/3/turn.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        html, body {
            margin: 0;
            padding: 0;
            height: 100%;
            background: radial-gradient(circle, #444444 0%, #111111 100%);
            font-family: "Helvetica Neue", Helvetica, Arial, sans-serif;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        h1 {
            color: #fff;
            font-size: 18px;
            text-align: center;
            margin: 10px 0 0 0;
            font-weight: 300;
        }

        .container {
            flex: 1;
            overflow: auto; 
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
            padding: 10px;
        }

        #book-wrapper {
            position: relative;
            margin: auto;
        }

        #flipbook {
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.6);
            display: none; 
            transition: transform 0.1s ease-out;
        }
        
        .page {
            background-color: white;
            position: relative;
        }

        canvas {
            width: 100%;
            height: 100%;
            display: block;
        }

        .thumbnail-container {
            display: none;
            height: 120px;
            background: rgba(25, 25, 25, 0.95);
            backdrop-filter: blur(10px);
            border-top: 1px solid rgba(255, 255, 255, 0.1);
            overflow-x: auto;
            overflow-y: hidden;
            white-space: nowrap;
            padding: 10px;
            box-sizing: border-box;
            align-items: center;
            z-index: 9;
        }

        .thumbnail-container::-webkit-scrollbar {
            height: 6px;
        }
        .thumbnail-container::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.2);
            border-radius: 3px;
        }

        .thumb-item {
            display: inline-flex;
            height: 100%;
            margin: 0 6px;
            cursor: pointer;
            border: 2px solid transparent;
            border-radius: 4px;
            overflow: hidden;
            box-sizing: border-box;
            transition: all 0.2s ease;
            background: rgba(255, 255, 255, 0.05);
            box-shadow: 0 4px 10px rgba(0,0,0,0.5);
            flex-shrink: 0; 
            min-width: 60px; /* 預防載入前縮圖縮成一團 */
            justify-content: center;
            align-items: center;
        }

        .thumb-item:hover {
            border-color: rgba(255, 255, 255, 0.5);
        }

        .thumb-item.active {
            border-color: #ff4a4a;
            box-shadow: 0 0 10px rgba(255, 74, 74, 0.6);
        }

        .thumb-canvas {
            height: 100%;
            width: auto;
            display: block;
        }

        .toolbar {
            height: 60px;
            background: rgba(20, 20, 20, 0.95);
            backdrop-filter: blur(10px);
            border-top: 1px solid rgba(255,255,255,0.1);
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
            color: #ccc;
            user-select: none;
            z-index: 10;
            padding: 0 15px;
        }

        .progress-container {
            flex: 1;
            display: flex;
            align-items: center;
            margin: 0 15px;
            min-width: 100px;
        }

        #page-slider {
            -webkit-appearance: none;
            appearance: none;
            width: 100%;
            height: 4px;
            background: rgba(255, 255, 255, 0.2);
            border-radius: 2px;
            outline: none;
            cursor: pointer;
            transition: background 0.3s;
        }

        #page-slider:hover {
            background: rgba(255, 255, 255, 0.4);
        }

        #page-slider::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            width: 14px;
            height: 14px;
            border-radius: 50%;
            background: #ffffff;
            cursor: pointer;
            box-shadow: 0 0 5px rgba(0, 0, 0, 0.5);
            transition: transform 0.1s ease;
        }
        #page-slider::-webkit-slider-thumb:hover {
            transform: scale(1.25);
        }

        .btn {
            background: none;
            border: none;
            color: #ccc;
            font-size: 16px;
            cursor: pointer;
            padding: 10px 12px;
            border-radius: 5px;
            transition: all 0.2s ease;
            flex-shrink: 0;
        }

        .btn:hover {
            color: #fff;
            background: rgba(255, 255, 255, 0.1);
        }
        
        .btn-zoom { color: #00adb5; }
        .btn-zoom:hover { color: #00fff6; }

        .page-info {
            font-size: 13px;
            letter-spacing: 1px;
            white-space: nowrap;
            flex-shrink: 0;
        }

        .divider {
            width: 1px;
            height: 15px;
            background: rgba(255,255,255,0.2);
            flex-shrink: 0;
        }

        #loading {
            position: absolute;
            color: #fff;
            font-size: 16px;
            text-align: center;
            max-width: 80%;
            line-height: 1.6;
            z-index: 99;
        }
        #loading i {
            font-size: 35px;
            margin-bottom: 15px;
            color: #00adb5;
        }
        .error-hint {
            color: #ff6b6b;
            font-size: 13px;
            margin-top: 10px;
            background: rgba(0,0,0,0.4);
            padding: 10px;
            border-radius: 5px;
            text-align: left;
        }

        /* 頁面內部的微型載入轉圈 */
        .page-spinner {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            color: #999;
            font-size: 20px;
        }

        @media (max-width: 767px) {
            #first-page, #last-page, .divider {
                display: none; 
            }
            .toolbar { gap: 5px; padding: 0 10px; }
            .progress-container { margin: 0 8px; }
            h1 { font-size: 15px; }
        }
    </style>
</head>
<body>

    <h1>可樂旅遊－迪士尼探險號旅遊手冊</h1>

    <div class="container">
        <div id="loading">
            <i class="fas fa-spinner fa-spin" id="loading-icon"></i>
            <div id="loading-text">載入中...</div>
        </div>
        
        <div id="book-wrapper">
            <div id="flipbook"></div>
        </div>
    </div>

    <div class="thumbnail-container" id="thumbnail-container"></div>

    <div class="toolbar">
        <button class="btn" id="first-page" title="回到封面"><i class="fas fa-angles-left"></i></button>
        <button class="btn" id="prev-page" title="上一頁"><i class="fas fa-chevron-left"></i></button>
        
        <span class="page-info"><span id="current-page">1</span> / <span id="total-pages">0</span></span>
        
        <button class="btn" id="next-page" title="下一頁"><i class="fas fa-chevron-right"></i></button>
        <button class="btn" id="last-page" title="移至封底"><i class="fas fa-angles-right"></i></button>
        
        <div class="divider"></div>
        
        <div class="progress-container">
            <input type="range" id="page-slider" min="1" max="1" value="1" title="拖動跳頁">
        </div>
        
        <div class="divider"></div>
        
        <button class="btn btn-zoom" id="zoom-out" title="縮小"><i class="fas fa-magnifying-glass-minus"></i></button>
        <button class="btn btn-zoom" id="zoom-in" title="放大"><i class="fas fa-magnifying-glass-plus"></i></button>
        
        <div class="divider"></div>
        
        <button class="btn" id="fullscreen" title="全螢幕"><i class="fas fa-expand"></i></button>
        
        <div class="divider"></div>
        <button class="btn" id="toggle-thumbnails" title="頁面預覽"><i class="fas fa-th-large"></i></button>
    </div>

    <script>
        // 全域錯誤捕捉
        window.onerror = function(msg, url, line) {
            showError('JavaScript 執行錯誤: ' + msg + '<br>請檢查網路連線或是否正確引入套件。');
            return false;
        };

        function showError(htmlContent) {
            $('#loading-icon').removeClass('fa-spinner fa-spin').addClass('fa-exclamation-triangle').css('color', '#ff4a4a');
            $('#loading-text').html(htmlContent);
        }

        // 偵測是否直接雙擊本機檔案開啟
        if (window.location.protocol === 'file:') {
            setTimeout(() => {
                showError('偵測到您直接雙擊打開了 HTML 檔案。<br>' +
                          '由於瀏覽器的安全隱私限制（CORS），無法直接讀取本機 PDF。<br>' +
                          '<div class="error-hint"><b>💡 解決方法：</b><br>' +
                          '1. 請使用 VS Code 的 <b>Live Server</b> 開啟網頁。<br>' +
                          '2. 或將網頁與 PDF 檔案上傳到伺服器環境（如 GitHub Pages）再觀看。</div>');
            }, 1000);
        }

        try {
            pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
        } catch(e) {
            showError('PDF.js 套件初始化失敗，請檢查網路是否連線。');
        }

        const pdfUrl = 'DLC.pdf'; 
        const isMobile = window.innerWidth < 768;
        let bookWidth, bookHeight;

        if (isMobile) {
            const maxWidth = window.innerWidth - 20;   
            const maxHeight = window.innerHeight - 130; 
            bookWidth = maxWidth;
            bookHeight = bookWidth * 1.414; 
            if (bookHeight > maxHeight) {
                bookHeight = maxHeight;
                bookWidth = bookHeight / 1.414;
            }
        } else {
            bookWidth = 848;  
            bookHeight = 600; 
        }

        $('#book-wrapper, #flipbook').css({ 'width': bookWidth + 'px', 'height': bookHeight + 'px' });
        const singlePageWidth = isMobile ? bookWidth : (bookWidth / 2);
        $('head').append(`<style>.page { width: ${singlePageWidth}px !important; height: ${bookHeight}px !important; }</style>`);

        // 執行主程序
        if (window.location.protocol !== 'file:') {
            pdfjsLib.getDocument(pdfUrl).promise.then(async function(pdf) {
                const totalPages = pdf.numPages;
                $('#total-pages').text(totalPages);
                $('#page-slider').attr('max', totalPages);

                const $flipbook = $('#flipbook');
                const views = [];
                if (isMobile) {
                    for (let i = 1; i <= totalPages; i++) views.push([i]);
                } else {
                    views.push([1]); 
                    for (let i = 2; i < totalPages; i += 2) {
                        views.push([i, i + 1]); 
                    }
                    if (totalPages % 2 === 0 && totalPages > 1) {
                        views.push([totalPages]); 
                    }
                }

                // 1. 建立預覽圖的 DOM 外殼（先放轉圈圖示，不阻礙主畫面打開）
                views.forEach((viewPages, index) => {
                    const $thumbItem = $(`<div class="thumb-item" id="thumb-view-${index}"><i class="fas fa-spinner fa-spin" style="color:#555; font-size:12px;"></i></div>`);
                    $thumbItem.data('pages', viewPages);
                    $thumbItem.click(function() {
                        $flipbook.turn('page', viewPages[0]); 
                    });
                    $('#thumbnail-container').append($thumbItem);
                });

                // 2. 建立翻頁書的空頁面外殼（秒開核心邏輯）
                for (let pageNum = 1; pageNum <= totalPages; pageNum++) {
                    const $pageDiv = $('<div class="page"></div>');
                    if(!isMobile && (pageNum === 1 || pageNum === totalPages)) {
                        $pageDiv.addClass('hard'); 
                    }
                    // 先塞入一個微型的載入圖示
                    $pageDiv.html('<div class="page-spinner"><i class="fas fa-spinner fa-spin"></i></div>');
                    $flipbook.append($pageDiv);
                }

                // 3. 隱藏主載入畫面，立刻初始化並顯示電子書！
                $('#loading').hide();
                
                $flipbook.show().turn({
                    width: bookWidth,      
                    height: bookHeight,     
                    display: isMobile ? 'single' : 'double', 
                    autoCenter: true,
                    elevation: isMobile ? 0 : 50, 
                    duration: 600,  
                    gradients: true, 
                    when: {
                        turning: function(event, page, view) {
                            // 當書本正在翻頁時，提早觸發即將顯示頁面的渲染
                            view.forEach(p => { if(p > 0) renderPageOnDemand(p); });
                        },
                        turned: function(event, page, view) {
                            $('#current-page').text(page);
                            $('#page-slider').val(page);

                            // 確保當前頁面已被渲染
                            view.forEach(p => { if(p > 0) renderPageOnDemand(p); });

                            // 更新預覽圖高亮
                            $('.thumb-item').removeClass('active');
                            $('.thumb-item').each(function() {
                                const pages = $(this).data('pages');
                                if (pages && pages.includes(page)) {
                                    $(this).addClass('active');
                                    if ($('#thumbnail-container').css('display') !== 'none') {
                                        this.scrollIntoView({ behavior: 'smooth', block: 'nearest', inline: 'center' });
                                    }
                                }
                            });
                        }
                    }
                });

                // 4. 管理「動態渲染」的快取機制
                const renderedPages = {};
                async function renderPageOnDemand(pageNum) {
                    if (renderedPages[pageNum]) return; // 畫過就不再重複畫
                    renderedPages[pageNum] = true;

                    try {
                        const page = await pdf.getPage(pageNum);
                        const $pageDiv = $flipbook.find('.page').eq(pageNum - 1);
                        
                        const canvas = document.createElement('canvas');
                        const viewport = page.getViewport({ scale: 1.5 }); 
                        const context = canvas.getContext('2d');
                        canvas.height = viewport.height;
                        canvas.width = viewport.width;
                        
                        $pageDiv.empty().append(canvas); // 清除轉圈圈，塞入畫布
                        await page.render({ canvasContext: context, viewport: viewport }).promise;
                    } catch (err) {
                        console.error('頁面渲染失敗:', pageNum, err);
                    }
                }

                // 預先手動觸發前兩頁，體驗更流暢
                renderPageOnDemand(1);
                if(!isMobile && totalPages > 1) renderPageOnDemand(2);

                // 5. 在背景默默渲染下方縮圖（完全不卡主畫面翻頁）
                async function startBackgroundThumbnails() {
                    for (let index = 0; index < views.length; index++) {
                        const viewPages = views[index];
                        const $thumbItem = $(`#thumb-view-${index}`);
                        
                        // 先清空轉圈圖示
                        $thumbItem.empty();

                        for (const pNum of viewPages) {
                            try {
                                const page = await pdf.getPage(pNum);
                                const thumbCanvas = document.createElement('canvas');
                                thumbCanvas.className = 'thumb-canvas';
                                $thumbItem.append(thumbCanvas);

                                const thumbViewport = page.getViewport({ scale: 0.15 }); 
                                const thumbContext = thumbCanvas.getContext('2d');
                                thumbCanvas.height = thumbViewport.height;
                                thumbCanvas.width = thumbViewport.width;
                                await page.render({ canvasContext: thumbContext, viewport: thumbViewport }).promise;
                            } catch(e) {
                                console.error('縮圖渲染失敗:', pNum, e);
                            }
                        }
                    }
                }
                startBackgroundThumbnails();

                // ─── 以下為互動與控制邏輯（維持不變） ───
                $('#page-slider').on('input change', function() {
                    const targetPage = parseInt($(this).val());
                    $('#current-page').text(targetPage);
                    $flipbook.turn('page', targetPage);
                });

                let zoomLevel = 1.0;
                const maxZoom = 2.5; 
                const minZoom = 1.0; 
                const zoomStep = 0.3; 

                function applyZoom() {
                    $('#flipbook').css({
                        'transform': `scale(${zoomLevel})`,
                        'transform-origin': 'top center' 
                    });
                    $('#book-wrapper').css({
                        'width': (bookWidth * zoomLevel) + 'px',
                        'height': (bookHeight * zoomLevel) + 'px'
                    });

                    if (zoomLevel > 1.0) {
                        $('.container').css('cursor', 'grab');
                        $flipbook.turn('disable', true); 
                    } else {
                        $('.container').css('cursor', 'default');
                        $flipbook.turn('disable', false); 
                    }
                }

                $('#zoom-in').click(function() {
                    if (zoomLevel < maxZoom) { zoomLevel += zoomStep; applyZoom(); }
                });
                $('#zoom-out').click(function() {
                    if (zoomLevel > minZoom) { zoomLevel -= zoomStep; applyZoom(); }
                });

                let isDragging = false;
                let startX, startY, startScrollLeft, startScrollTop;
                const $container = $('.container');

                $container.on('mousedown', function(e) {
                    if (zoomLevel <= 1.0) return;
                    e.preventDefault();
                    isDragging = true;
                    $container.css('cursor', 'grabbing');
                    startX = e.pageX;
                    startY = e.pageY;
                    startScrollLeft = $container.scrollLeft();
                    startScrollTop = $container.scrollTop();
                });

                $(document).on('mousemove', function(e) {
                    if (!isDragging) return;
                    const deltaX = e.pageX - startX;
                    const deltaY = e.pageY - startY;
                    $container.scrollLeft(startScrollLeft - deltaX);
                    $container.scrollTop(startScrollTop - deltaY);
                });

                $(document).on('mouseup mouseleave', function() {
                    if (!isDragging) return;
                    isDragging = false;
                    if (zoomLevel > 1.0) {
                        $container.css('cursor', 'grab');
                    } else {
                        $container.css('cursor', 'default');
                    }
                });

                $('#first-page').click(function() { $flipbook.turn('page', 1); });
                $('#last-page').click(function() { $flipbook.turn('page', totalPages); });
                $('#prev-page').click(function() { $flipbook.turn('previous'); });
                $('#next-page').click(function() { $flipbook.turn('next'); });
                
                $('#fullscreen').click(function() {
                    if (!document.fullscreenElement) {
                        document.documentElement.requestFullscreen();
                    } else {
                        if (document.exitFullscreen) { document.exitFullscreen(); }
                    }
                });

                $('#toggle-thumbnails').click(function() {
                    const $thumbContainer = $('#thumbnail-container');
                    if ($thumbContainer.css('display') === 'none') {
                        $thumbContainer.css('display', 'flex');
                        setTimeout(() => {
                            const $active = $('.thumb-item.active');
                            if ($active.length) {
                                $active[0].scrollIntoView({ behavior: 'smooth', block: 'nearest', inline: 'center' });
                            }
                        }, 100);
                    } else {
                        $thumbContainer.css('display', 'none');
                    }
                });

            }).catch(function(error) {
                showError('PDF 載入失敗！<br>請檢查是否確實有 <b>DLC.pdf</b> 檔案，且與網頁放在同個資料夾。<br><span style="font-size:11px; color:#aaa;">Error: ' + error.message + '</span>');
                console.error(error);
            });
        }
    </script>

</body>
</html>
