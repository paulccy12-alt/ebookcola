<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>可樂旅遊迪士尼探險號旅遊手冊</title>
    
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/turn.js/3/turn.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        html, body {
            margin: 0;
            padding: 0;
            height: 100%;
            background: radial-gradient(circle, #444444 0%, #111111 100%);
            font-family: "Helvetica Neue", Helvetica, Arial, sans-serif;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        h1 {
            color: #fff;
            font-size: 18px;
            text-align: center;
            margin: 10px 0 0 0;
            font-weight: 300;
        }

        /* 主畫面區塊 */
        .container {
            flex: 1;
            overflow: auto; 
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
            padding: 10px; /* 手機版縮小間距 */
        }

        /* 包裝盒與書本本體：改由 JS 動態控制寬高，移除 CSS 寫死尺寸 */
        #book-wrapper {
            position: relative;
            margin: auto;
        }

        #flipbook {
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.6);
            display: none; 
            transition: transform 0.1s ease-out;
        }
        
        .page {
            background-color: white;
        }

        canvas {
            width: 100%;
            height: 100%;
            display: block;
        }

        /* 下方控制列 */
        .toolbar {
            height: 60px;
            background: rgba(20, 20, 20, 0.95);
            backdrop-filter: blur(10px);
            border-top: 1px solid rgba(255,255,255,0.1);
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
            color: #ccc;
            user-select: none;
            z-index: 10;
            padding: 0 10px;
        }

        .btn {
            background: none;
            border: none;
            color: #ccc;
            font-size: 16px;
            cursor: pointer;
            padding: 10px 12px;
            border-radius: 5px;
            transition: all 0.2s ease;
        }

        .btn:hover {
            color: #fff;
            background: rgba(255, 255, 255, 0.1);
        }
        
        .btn-zoom { color: #00adb5; }
        .btn-zoom:hover { color: #00fff6; }

        .page-info {
            font-size: 13px;
            letter-spacing: 1px;
            white-space: nowrap;
        }

        .divider {
            width: 1px;
            height: 15px;
            background: rgba(255,255,255,0.2);
        }

        #loading {
            position: absolute;
            color: #fff;
            font-size: 16px;
            text-align: center;
        }
        #loading i {
            font-size: 35px;
            margin-bottom: 15px;
            color: #00adb5;
        }

        /* 📱 RWD 手機版微調：隱藏部分不重要按鈕，節省空間 */
        @media (max-width: 767px) {
            #first-page, #last-page {
                display: none; 
            }
            h1 { font-size: 15px; }
        }
    </style>
</head>
<body>

    <h1>可樂旅遊迪士尼探險號旅遊手冊</h1>

    <div class="container">
        <div id="loading">
            <i class="fas fa-spinner fa-spin"></i>
            <div>載入中...</div>
        </div>
        
        <div id="book-wrapper">
            <div id="flipbook"></div>
        </div>
    </div>

    <div class="toolbar">
        <button class="btn" id="first-page" title="回到封面"><i class="fas fa-angles-left"></i></button>
        <button class="btn" id="prev-page" title="上一頁"><i class="fas fa-chevron-left"></i></button>
        
        <span class="page-info"><span id="current-page">1</span> / <span id="total-pages">0</span></span>
        
        <button class="btn" id="next-page" title="下一頁"><i class="fas fa-chevron-right"></i></button>
        <button class="btn" id="last-page" title="移至封底"><i class="fas fa-angles-right"></i></button>
        
        <div class="divider"></div>
        
        <button class="btn btn-zoom" id="zoom-out" title="縮小"><i class="fas fa-magnifying-glass-minus"></i></button>
        <button class="btn btn-zoom" id="zoom-in" title="放大"><i class="fas fa-magnifying-glass-plus"></i></button>
        
        <div class="divider"></div>
        
        <button class="btn" id="fullscreen" title="全螢幕"><i class="fas fa-expand"></i></button>
    </div>

    <script>
        pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

        const pdfUrl = 'DLC.pdf'; 
        
        // ⚙️ 核心邏輯：偵測裝置並動態計算 A4 最完美尺寸
        const isMobile = window.innerWidth < 768;
        let bookWidth, bookHeight;

        if (isMobile) {
            // 手機版：單頁滿版顯示
            const maxWidth = window.innerWidth - 20;   // 扣除左右邊距
            const maxHeight = window.innerHeight - 130; // 扣除標題與工具列
            
            bookWidth = maxWidth;
            bookHeight = bookWidth * 1.414; // A4 比例 (高 = 寬 * 1.414)
            
            // 如果算出來的高度超出手機螢幕，改以高度為基準回推寬度
            if (bookHeight > maxHeight) {
                bookHeight = maxHeight;
                bookWidth = bookHeight / 1.414;
            }
        } else {
            // 電子版：雙頁顯示 (預設標準尺寸)
            bookWidth = 848;  
            bookHeight = 600; 
        }

        // 動態將計算好的寬高寫入外框與單頁 CSS
        $('#book-wrapper, #flipbook').css({ 'width': bookWidth + 'px', 'height': bookHeight + 'px' });
        const singlePageWidth = isMobile ? bookWidth : (bookWidth / 2);
        $('head').append(`<style>.page { width: ${singlePageWidth}px !important; height: ${bookHeight}px !important; }</style>`);

        // 載入 PDF
        pdfjsLib.getDocument(pdfUrl).promise.then(async function(pdf) {
            const totalPages = pdf.numPages;
            $('#total-pages').text(totalPages);
            const $flipbook = $('#flipbook');

            for (let pageNum = 1; pageNum <= totalPages; pageNum++) {
                const $pageDiv = $('<div class="page"></div>');
                if(!isMobile && (pageNum === 1 || pageNum === totalPages)) {
                    $pageDiv.addClass('hard'); // 手機版關閉硬皮，避免翻頁計算出錯
                }
                const canvas = document.createElement('canvas');
                $pageDiv.append(canvas);
                $flipbook.append($pageDiv);

                const page = await pdf.getPage(pageNum);
                // 為了手機版放大依然清晰，渲染倍率維持 2.0
                const viewport = page.getViewport({ scale: 2.0 }); 
                const context = canvas.getContext('2d');
                canvas.height = viewport.height;
                canvas.width = viewport.width;

                const renderContext = { canvasContext: context, viewport: viewport };
                await page.render(renderContext).promise;
            }

            $('#loading').hide();
            
            // 初始化 Turn.js
            $flipbook.show().turn({
                width: bookWidth,      
                height: bookHeight,     
                display: isMobile ? 'single' : 'double', // ⭐ 關鍵：手機版單頁，電腦版雙頁
                autoCenter: true,
                elevation: isMobile ? 0 : 50, // 手機版降低複雜度，關閉抬角
                duration: 600,  
                gradients: true, 
                when: {
                    turned: function(event, page, view) {
                        $('#current-page').text(page);
                    }
                }
            });

            // --- 放大縮小功能 (手機版同樣支援) ---
            let zoomLevel = 1.0;
            const maxZoom = 2.5; 
            const minZoom = 1.0; 
            const zoomStep = 0.3; 

            function applyZoom() {
                $('#flipbook').css({
                    'transform': `scale(${zoomLevel})`,
                    'transform-origin': 'top center' // 改為置中放大，手機體驗較佳
                });
                $('#book-wrapper').css({
                    'width': (bookWidth * zoomLevel) + 'px',
                    'height': (bookHeight * zoomLevel) + 'px'
                });
            }

            $('#zoom-in').click(function() {
                if (zoomLevel < maxZoom) { zoomLevel += zoomStep; applyZoom(); }
            });
            $('#zoom-out').click(function() {
                if (zoomLevel > minZoom) { zoomLevel -= zoomStep; applyZoom(); }
            });

            // --- 控制功能 ---
            $('#first-page').click(function() { $flipbook.turn('page', 1); });
            $('#last-page').click(function() { $flipbook.turn('page', totalPages); });
            $('#prev-page').click(function() { $flipbook.turn('previous'); });
            $('#next-page').click(function() { $flipbook.turn('next'); });
            
            $('#fullscreen').click(function() {
                if (!document.fullscreenElement) {
                    document.documentElement.requestFullscreen();
                } else {
                    if (document.exitFullscreen) { document.exitFullscreen(); }
                }
            });

        }).catch(function(error) {
            $('#loading').html('<i class="fas fa-exclamation-triangle" style="color:ff4a4a;"></i><br>PDF 載入失敗');
            console.error(error);
        });
    </script>

</body>
</html>
