<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>可樂旅遊－迪士尼探險號旅遊手冊</title>
    
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/turn.js/3/turn.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        html, body {
            margin: 0;
            padding: 0;
            height: 100%;
            background: radial-gradient(circle, #444444 0%, #111111 100%);
            font-family: "Helvetica Neue", Helvetica, Arial, sans-serif;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        h1 {
            color: #fff;
            font-size: 18px;
            text-align: center;
            margin: 10px 0 0 0;
            font-weight: 300;
        }

        /* 主畫面區塊 */
        .container {
            flex: 1;
            overflow: auto; 
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
            padding: 10px;
        }

        /* 包裝盒與書本本體 */
        #book-wrapper {
            position: relative;
            margin: auto;
        }

        #flipbook {
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.6);
            display: none; 
            transition: transform 0.1s ease-out;
        }
        
        .page {
            background-color: white;
        }

        canvas {
            width: 100%;
            height: 100%;
            display: block;
        }

        /* 下方預覽圖軌道 */
        .thumbnail-container {
            display: none;
            height: 120px;
            background: rgba(25, 25, 25, 0.95);
            backdrop-filter: blur(10px);
            border-top: 1px solid rgba(255, 255, 255, 0.1);
            overflow-x: auto;
            overflow-y: hidden;
            white-space: nowrap;
            padding: 10px;
            box-sizing: border-box;
            align-items: center;
            z-index: 9;
        }

        /* 美化預覽軸捲動條 */
        .thumbnail-container::-webkit-scrollbar {
            height: 6px;
        }
        .thumbnail-container::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.2);
            border-radius: 3px;
        }

        .thumb-item {
            display: inline-flex;
            height: 100%;
            margin: 0 6px;
            cursor: pointer;
            border: 2px solid transparent;
            border-radius: 4px;
            overflow: hidden;
            box-sizing: border-box;
            transition: all 0.2s ease;
            background: rgba(255, 255, 255, 0.05);
            box-shadow: 0 4px 10px rgba(0,0,0,0.5);
            /* ⭐ 關鍵修正：禁止 Flex 擠壓縮圖，徹底解決圖片被壓扁的問題 */
            flex-shrink: 0; 
        }

        .thumb-item:hover {
            border-color: rgba(255, 255, 255, 0.5);
        }

        /* 當前觀看頁面的紅色高亮外框 */
        .thumb-item.active {
            border-color: #ff4a4a;
            box-shadow: 0 0 10px rgba(255, 74, 74, 0.6);
        }

        .thumb-canvas {
            height: 100%;
            width: auto;
            display: block;
        }

        /* 下方控制列 */
        .toolbar {
            height: 60px;
            background: rgba(20, 20, 20, 0.95);
            backdrop-filter: blur(10px);
            border-top: 1px solid rgba(255,255,255,0.1);
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
            color: #ccc;
            user-select: none;
            z-index: 10;
            padding: 0 15px;
        }

        /* ─── 新增：進度條（線條+圓點）容器與樣式 ─── */
        .progress-container {
            flex: 1;
            display: flex;
            align-items: center;
            margin: 0 15px;
            min-width: 100px;
        }

        #page-slider {
            -webkit-appearance: none;
            appearance: none;
            width: 100%;
            height: 4px;
            background: rgba(255, 255, 255, 0.2);
            border-radius: 2px;
            outline: none;
            cursor: pointer;
            transition: background 0.3s;
        }

        #page-slider:hover {
            background: rgba(255, 255, 255, 0.4);
        }

        /* 自訂進度條圓點 (Chrome, Safari, Edge) */
        #page-slider::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            width: 14px;
            height: 14px;
            border-radius: 50%;
            background: #ffffff;
            cursor: pointer;
            box-shadow: 0 0 5px rgba(0, 0, 0, 0.5);
            transition: transform 0.1s ease;
        }
        #page-slider::-webkit-slider-thumb:hover {
            transform: scale(1.25);
        }

        /* 自訂進度條圓點 (Firefox) */
        #page-slider::-moz-range-thumb {
            width: 14px;
            height: 14px;
            border: none;
            border-radius: 50%;
            background: #ffffff;
            cursor: pointer;
            box-shadow: 0 0 5px rgba(0, 0, 0, 0.5);
            transition: transform 0.1s ease;
        }
        #page-slider::-moz-range-thumb:hover {
            transform: scale(1.25);
        }

        .btn {
            background: none;
            border: none;
            color: #ccc;
            font-size: 16px;
            cursor: pointer;
            padding: 10px 12px;
            border-radius: 5px;
            transition: all 0.2s ease;
            flex-shrink: 0;
        }

        .btn:hover {
            color: #fff;
            background: rgba(255, 255, 255, 0.1);
        }
        
        .btn-zoom { color: #00adb5; }
        .btn-zoom:hover { color: #00fff6; }

        .page-info {
            font-size: 13px;
            letter-spacing: 1px;
            white-space: nowrap;
            flex-shrink: 0;
        }

        .divider {
            width: 1px;
            height: 15px;
            background: rgba(255,255,255,0.2);
            flex-shrink: 0;
        }

        #loading {
            position: absolute;
            color: #fff;
            font-size: 16px;
            text-align: center;
        }
        #loading i {
            font-size: 35px;
            margin-bottom: 15px;
            color: #00adb5;
        }

        /* 📱 RWD 手機版微調 */
        @media (max-width: 767px) {
            #first-page, #last-page, .divider {
                display: none; 
            }
            .toolbar { gap: 5px; padding: 0 10px; }
            .progress-container { margin: 0 8px; }
            h1 { font-size: 15px; }
        }
    </style>
</head>
<body>

    <h1>可樂旅遊－迪士尼探險號旅遊手冊</h1>

    <div class="container">
        <div id="loading">
            <i class="fas fa-spinner fa-spin"></i>
            <div>載入中...</div>
        </div>
        
        <div id="book-wrapper">
            <div id="flipbook"></div>
        </div>
    </div>

    <div class="thumbnail-container" id="thumbnail-container"></div>

    <div class="toolbar">
        <button class="btn" id="first-page" title="回到封面"><i class="fas fa-angles-left"></i></button>
        <button class="btn" id="prev-page" title="上一頁"><i class="fas fa-chevron-left"></i></button>
        
        <span class="page-info"><span id="current-page">1</span> / <span id="total-pages">0</span></span>
        
        <button class="btn" id="next-page" title="下一頁"><i class="fas fa-chevron-right"></i></button>
        <button class="btn" id="last-page" title="移至封底"><i class="fas fa-angles-right"></i></button>
        
        <div class="divider"></div>
        
        <div class="progress-container">
            <input type="range" id="page-slider" min="1" max="1" value="1" title="拖動跳頁">
        </div>
        
        <div class="divider"></div>
        
        <button class="btn btn-zoom" id="zoom-out" title="縮小"><i class="fas fa-magnifying-glass-minus"></i></button>
        <button class="btn btn-zoom" id="zoom-in" title="放大"><i class="fas fa-magnifying-glass-plus"></i></button>
        
        <div class="divider"></div>
        
        <button class="btn" id="fullscreen" title="全螢幕"><i class="fas fa-expand"></i></button>
        
        <div class="divider"></div>
        <button class="btn" id="toggle-thumbnails" title="頁面預覽"><i class="fas fa-th-large"></i></button>
    </div>

    <script>
        pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

        const pdfUrl = 'DLC.pdf'; 
        
        const isMobile = window.innerWidth < 768;
        let bookWidth, bookHeight;

        if (isMobile) {
            const maxWidth = window.innerWidth - 20;   
            const maxHeight = window.innerHeight - 130; 
            
            bookWidth = maxWidth;
            bookHeight = bookWidth * 1.414; 
            
            if (bookHeight > maxHeight) {
                bookHeight = maxHeight;
                bookWidth = bookHeight / 1.414;
            }
        } else {
            bookWidth = 848;  
            bookHeight = 600; 
        }

        $('#book-wrapper, #flipbook').css({ 'width': bookWidth + 'px', 'height': bookHeight + 'px' });
        const singlePageWidth = isMobile ? bookWidth : (bookWidth / 2);
        $('head').append(`<style>.page { width: ${singlePageWidth}px !important; height: ${bookHeight}px !important; }</style>`);

        // 載入 PDF
        pdfjsLib.getDocument(pdfUrl).promise.then(async function(pdf) {
            const totalPages = pdf.numPages;
            $('#total-pages').text(totalPages);
            
            // ⭐ 新增：初始化同步設定進度條的最大值
            $('#page-
