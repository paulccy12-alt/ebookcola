<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>可樂旅遊－迪士尼探險號旅遊手冊</title>
    
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/turn.js/3/turn.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        html, body {
            margin: 0;
            padding: 0;
            height: 100%;
            background: radial-gradient(circle, #444444 0%, #111111 100%);
            font-family: "Helvetica Neue", Helvetica, Arial, sans-serif;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        h1 {
            color: #fff;
            font-size: 18px;
            text-align: center;
            margin: 10px 0 0 0;
            font-weight: 300;
        }

        /* 主畫面區塊 */
        .container {
            flex: 1;
            overflow: auto; 
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
            padding: 10px; /* 手機版縮小間距 */
        }

        /* 包裝盒與書本本體 */
        #book-wrapper {
            position: relative;
            margin: auto;
        }

        #flipbook {
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.6);
            display: none; 
            transition: transform 0.1s ease-out;
        }
        
        .page {
            background-color: white;
        }

        canvas {
            width: 100%;
            height: 100%;
            display: block;
        }

        /* ─── 新增：下方預覽圖軌道 ─── */
        .thumbnail-container {
            display: none; /* 預設隱藏，點擊按鈕才顯示 */
            height: 120px;
            background: rgba(25, 25, 25, 0.95);
            backdrop-filter: blur(10px);
            border-top: 1px solid rgba(255, 255, 255, 0.1);
            overflow-x: auto;
            overflow-y: hidden;
            white-space: nowrap;
            padding: 10px;
            box-sizing: border-box;
            align-items: center;
            z-index: 9;
        }

        /* 美化預覽軸捲動條 */
        .thumbnail-container::-webkit-scrollbar {
            height: 6px;
        }
        .thumbnail-container::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.2);
            border-radius: 3px;
        }

        .thumb-item {
            display: inline-flex;
            height: 100%;
            margin: 0 6px;
            cursor: pointer;
            border: 2px solid transparent;
            border-radius: 4px;
            overflow: hidden;
            box-sizing: border-box;
            transition: all 0.2s ease;
            background: rgba(255, 255, 255, 0.05);
            box-shadow: 0 4px 10px rgba(0,0,0,0.5);
        }

        .thumb-item:hover {
            border-color: rgba(255, 255, 255, 0.5);
        }

        /* 當前觀看頁面的紅色高亮外框（如截圖所示） */
        .thumb-item.active {
            border-color: #ff4a4a;
            box-shadow: 0 0 10px rgba(255, 74, 74, 0.6);
        }

        .thumb-canvas {
            height: 100%;
            width: auto;
            display: block;
        }

        /* 下方控制列 */
        .toolbar {
            height: 60px;
            background: rgba(20, 20, 20, 0.95);
            backdrop-filter: blur(10px);
            border-top: 1px solid rgba(255,255,255,0.1);
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
            color: #ccc;
            user-select: none;
            z-index: 10;
            padding: 0 10px;
        }

        .btn {
            background: none;
            border: none;
            color: #ccc;
            font-size: 16px;
            cursor: pointer;
            padding: 10px 12px;
            border-radius: 5px;
            transition: all 0.2s ease;
        }

        .btn:hover {
            color: #fff;
            background: rgba(255, 255, 255, 0.1);
        }
        
        .btn-zoom { color: #00adb5; }
        .btn-zoom:hover { color: #00fff6; }

        .page-info {
            font-size: 13px;
            letter-spacing: 1px;
            white-space: nowrap;
        }

        .divider {
            width: 1px;
            height: 15px;
            background: rgba(255,255,255,0.2);
        }

        #loading {
            position: absolute;
            color: #fff;
            font-size: 16px;
            text-align: center;
        }
        #loading i {
            font-size: 35px;
            margin-bottom: 15px;
            color: #00adb5;
        }

        /* 📱 RWD 手機版微調 */
        @media (max-width: 767px) {
            #first-page, #last-page {
                display: none; 
            }
            h1 { font-size: 15px; }
        }
    </style>
</head>
<body>

    <h1>可樂旅遊－迪士尼探險號旅遊手冊</h1>

    <div class="container">
        <div id="loading">
            <i class="fas fa-spinner fa-spin"></i>
            <div>載入中...</div>
        </div>
        
        <div id="book-wrapper">
            <div id="flipbook"></div>
        </div>
    </div>

    <div class="thumbnail-container" id="thumbnail-container"></div>

    <div class="toolbar">
        <button class="btn" id="first-page" title="回到封面"><i class="fas fa-angles-left"></i></button>
        <button class="btn" id="prev-page" title="上一頁"><i class="fas fa-chevron-left"></i></button>
        
        <span class="page-info"><span id="current-page">1</span> / <span id="total-pages">0</span></span>
        
        <button class="btn" id="next-page" title="下一頁"><i class="fas fa-chevron-right"></i></button>
        <button class="btn" id="last-page" title="移至封底"><i class="fas fa-angles-right"></i></button>
        
        <div class="divider"></div>
        
        <button class="btn btn-zoom" id="zoom-out" title="縮小"><i class="fas fa-magnifying-glass-minus"></i></button>
        <button class="btn btn-zoom" id="zoom-in" title="放大"><i class="fas fa-magnifying-glass-plus"></i></button>
        
        <div class="divider"></div>
        
        <button class="btn" id="fullscreen" title="全螢幕"><i class="fas fa-expand"></i></button>
        
        <div class="divider"></div>
        <button class="btn" id="toggle-thumbnails" title="頁面預覽"><i class="fas fa-th-large"></i></button>
    </div>

    <script>
        pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

        const pdfUrl = 'DLC.pdf'; 
        
        const isMobile = window.innerWidth < 768;
        let bookWidth, bookHeight;

        if (isMobile) {
            const maxWidth = window.innerWidth - 20;   
            const maxHeight = window.innerHeight - 130; 
            
            bookWidth = maxWidth;
            bookHeight = bookWidth * 1.414; 
            
            if (bookHeight > maxHeight) {
                bookHeight = maxHeight;
                bookWidth = bookHeight / 1.414;
            }
        } else {
            bookWidth = 848;  
            bookHeight = 600; 
        }

        $('#book-wrapper, #flipbook').css({ 'width': bookWidth + 'px', 'height': bookHeight + 'px' });
        const singlePageWidth = isMobile ? bookWidth : (bookWidth / 2);
        $('head').append(`<style>.page { width: ${singlePageWidth}px !important; height: ${bookHeight}px !important; }</style>`);

        // 載入 PDF
        pdfjsLib.getDocument(pdfUrl).promise.then(async function(pdf) {
            const totalPages = pdf.numPages;
            $('#total-pages').text(totalPages);
            const $flipbook = $('#flipbook');

            // ⚙️ 新增：規劃預覽分組（電腦版雙頁合併、封面封底單頁；手機版全單頁）
            const views = [];
            if (isMobile) {
                for (let i = 1; i <= totalPages; i++) views.push([i]);
            } else {
                views.push([1]); // 封面
                for (let i = 2; i < totalPages; i += 2) {
                    views.push([i, i + 1]); // 中間雙頁配對
                }
                if (totalPages % 2 === 0 && totalPages > 1) {
                    views.push([totalPages]); // 封底
                }
            }

            // 初始化預覽圖的 DOM 外殼
            views.forEach((viewPages, index) => {
                const $thumbItem = $(`<div class="thumb-item" id="thumb-view-${index}"></div>`);
                $thumbItem.data('pages', viewPages);
                $thumbItem.click(function() {
                    $flipbook.turn('page', viewPages[0]); // 點擊跳轉到該視圖的第一頁
                });
                $('#thumbnail-container').append($thumbItem);
            });

            // 循環渲染主畫面與預覽圖（同步處理以提高效能）
            for (let pageNum = 1; pageNum <= totalPages; pageNum++) {
                const $pageDiv = $('<div class="page"></div>');
                if(!isMobile && (pageNum === 1 || pageNum === totalPages)) {
                    $pageDiv.addClass('hard'); 
                }
                const canvas = document.createElement('canvas');
                $pageDiv.append(canvas);
                $flipbook.append($pageDiv);

                const page = await pdf.getPage(pageNum);
                
                // 1. 渲染主翻頁書畫布
                const viewport = page.getViewport({ scale: 2.0 }); 
                const context = canvas.getContext('2d');
                canvas.height = viewport.height;
                canvas.width = viewport.width;
                const renderContext = { canvasContext: context, viewport: viewport };
                await page.render(renderContext).promise;

                // 2. 新增：渲染低解析度預覽圖畫布
                const viewIndex = views.findIndex(v => v.includes(pageNum));
                if (viewIndex !== -1) {
                    const thumbCanvas = document.createElement('canvas');
                    thumbCanvas.className = 'thumb-canvas';
                    $(`#thumb-view-${viewIndex}`).append(thumbCanvas);

                    const thumbViewport = page.getViewport({ scale: 0.25 }); // 降低縮放比例
                    const thumbContext = thumbCanvas.getContext('2d');
                    thumbCanvas.height = thumbViewport.height;
                    thumbCanvas.width = thumbViewport.width;
                    const thumbRenderContext = { canvasContext: thumbContext, viewport: thumbViewport };
                    await page.render(thumbRenderContext).promise;
                }
            }

            $('#loading').hide();
            
            // 初始化 Turn.js
            $flipbook.show().turn({
                width: bookWidth,      
                height: bookHeight,     
                display: isMobile ? 'single' : 'double', 
                autoCenter: true,
                elevation: isMobile ? 0 : 50, 
                duration: 600,  
                gradients: true, 
                when: {
                    turned: function(event, page, view) {
                        $('#current-page').text(page);
                        
                        // 新增：更新預覽圖的高亮狀態
                        $('.thumb-item').removeClass('active');
                        $('.thumb-item').each(function() {
                            const pages = $(this).data('pages');
                            if (pages && pages.includes(page)) {
                                $(this).addClass('active');
                                
                                // 新增：若預覽列開啟中，自動將當前頁面捲動置中
                                if ($('#thumbnail-container').css('display') !== 'none') {
                                    this.scrollIntoView({ behavior: 'smooth', block: 'nearest', inline: 'center' });
                                }
                            }
                        });
                    }
                }
            });

            // 放大縮小功能
            let zoomLevel = 1.0;
            const maxZoom = 2.5; 
            const minZoom = 1.0; 
            const zoomStep = 0.3; 

            function applyZoom() {
                $('#flipbook').css({
                    'transform': `scale(${zoomLevel})`,
                    'transform-origin': 'top center' 
                });
                $('#book-wrapper').css({
                    'width': (bookWidth * zoomLevel) + 'px',
                    'height': (bookHeight * zoomLevel) + 'px'
                });
            }

            $('#zoom-in').click(function() {
                if (zoomLevel < maxZoom) { zoomLevel += zoomStep; applyZoom(); }
            });
            $('#zoom-out').click(function() {
                if (zoomLevel > minZoom) { zoomLevel -= zoomStep; applyZoom(); }
            });

            // 控制功能
            $('#first-page').click(function() { $flipbook.turn('page', 1); });
            $('#last-page').click(function() { $flipbook.turn('page', totalPages); });
            $('#prev-page').click(function() { $flipbook.turn('previous'); });
            $('#next-page').click(function() { $flipbook.turn('next'); });
            
            $('#fullscreen').click(function() {
                if (!document.fullscreenElement) {
                    document.documentElement.requestFullscreen();
                } else {
                    if (document.exitFullscreen) { document.exitFullscreen(); }
                }
            });

            // 新增：點擊按鈕切換預覽列顯示/隱藏
            $('#toggle-thumbnails').click(function() {
                const $thumbContainer = $('#thumbnail-container');
                if ($thumbContainer.css('display') === 'none') {
                    $thumbContainer.css('display', 'flex');
                    // 開啟時立即使當前頁面預覽圖置中
                    setTimeout(() => {
                        const $active = $('.thumb-item.active');
                        if ($active.length) {
                            $active[0].scrollIntoView({ behavior: 'smooth', block: 'nearest', inline: 'center' });
                        }
                    }, 100);
                } else {
                    $thumbContainer.css('display', 'none');
                }
            });

        }).catch(function(error) {
            $('#loading').html('<i class="fas fa-exclamation-triangle" style="color:ff4a4a;"></i><br>PDF 載入失敗');
            console.error(error);
        });
    </script>

</body>
</html>
