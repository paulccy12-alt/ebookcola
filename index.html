<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>迪士尼探險號旅遊手冊</title>
    
    <!-- 載入外部套件：jQuery, Turn.js, PDF.js, 與圖示庫 FontAwesome -->
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/turn.js/3/turn.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        /* FlipHTML5 經典深色高質感背景 */
        html, body {
            margin: 0;
            padding: 0;
            height: 100%;
            background: radial-gradient(circle, #444444 0%, #111111 100%);
            font-family: "Helvetica Neue", Helvetica, Arial, sans-serif;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        /* 主畫面區塊 */
        .container {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
        }

        /* 仿 FlipHTML5 的書本立體陰影 */
        #flipbook {
            width: 1000px;
            height: 600px;
            box-shadow: 0 30px 70px rgba(0, 0, 0, 0.6);
            display: none; /* 載入完才顯示 */
        }
        
        .page {
            width: 500px;
            height: 600px;
            background-color: white;
        }

        canvas {
            width: 100%;
            height: 100%;
            display: block;
        }

        /* 下方精美控制列 (Toolbar) */
        .toolbar {
            height: 60px;
            background: rgba(20, 20, 20, 0.85);
            backdrop-filter: blur(10px);
            border-top: 1px solid rgba(255,255,255,0.1);
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 20px;
            color: #ccc;
            user-select: none;
            z-index: 10;
        }

        .btn {
            background: none;
            border: none;
            color: #ccc;
            font-size: 18px;
            cursor: pointer;
            padding: 10px 15px;
            border-radius: 5px;
            transition: all 0.2s ease;
        }

        .btn:hover {
            color: #fff;
            background: rgba(255, 255, 255, 0.1);
        }

        .page-info {
            font-size: 14px;
            letter-spacing: 1px;
        }

        /* Loading 動畫 */
        #loading {
            position: absolute;
            color: #fff;
            font-size: 18px;
            text-align: center;
        }
        #loading i {
            font-size: 40px;
            margin-bottom: 15px;
            color: #00adb5;
        }
    </style>
</head>
<body>

    <!-- 主呈現區 -->
    <div class="container">
        <div id="loading">
            <i class="fas fa-spinner fa-spin"></i>
            <div>載入中請稍候...</div>
        </div>
        
        <!-- 3D 書本主體 -->
        <div id="flipbook"></div>
    </div>

    <!-- 下方 FlipHTML5 風格控制列 -->
    <div class="toolbar">
        <button class="btn" id="first-page" title="回到封面"><i class="fas fa-angles-left"></i></button>
        <button class="btn" id="prev-page" title="上一頁"><i class="fas fa-chevron-left"></i></button>
        
        <span class="page-info">第 <span id="current-page">1</span> 頁 / 共 <span id="total-pages">0</span> 頁</span>
        
        <button class="btn" id="next-page" title="下一頁"><i class="fas fa-chevron-right"></i></button>
        <button class="btn" id="last-page" title="移至封底"><i class="fas fa-angles-right"></i></button>
        <button class="btn" id="fullscreen" title="全螢幕切換"><i class="fas fa-expand"></i></button>
    </div>

    <script>
        // 初始化 PDF.js Worker
        pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

        // ⚠️ 請確保你的 PDF 檔名與路徑正確（這裡預設放在根目錄的 my-book.pdf）
        const pdfUrl = 'DLC.pdf'; 

        pdfjsLib.getDocument(pdfUrl).promise.then(async function(pdf) {
            const totalPages = pdf.numPages;
            $('#total-pages').text(totalPages);
            const $flipbook = $('#flipbook');

            // 核心：利用 PDF.js 把每一頁偷偷畫到 canvas 上並塞進書本裡
            for (let pageNum = 1; pageNum <= totalPages; pageNum++) {
                const $pageDiv = $('<div class="page"></div>');
                if(pageNum === 1 || pageNum === totalPages) {
                    $pageDiv.addClass('hard'); // 封面與封底設定為硬皮特效
                }
                const canvas = document.createElement('canvas');
                $pageDiv.append(canvas);
                $flipbook.append($pageDiv);

                const page = await pdf.getPage(pageNum);
                const viewport = page.getViewport({ scale: 1.5 }); // 調整清晰度
                const context = canvas.getContext('2d');
                canvas.height = viewport.height;
                canvas.width = viewport.width;

                const renderContext = { canvasContext: context, viewport: viewport };
                await page.render(renderContext).promise;
            }

            // 載入完成，隱藏 Loading 並初始化 Turn.js
            $('#loading').hide();
            $flipbook.show().turn({
                width: 1000,      // 雙頁總寬度
                height: 600,     // 總高度
                autoCenter: true,
                elevation: 50,   // 翻頁時的角度拉抬感
                duration: 1000,  // 翻頁動畫速度 (毫秒)
                gradients: true, // 啟用翻頁時的陰影漸層（超重要，立體感來源！）
                when: {
                    turned: function(event, page, view) {
                        $('#current-page').text(page);
                    }
                }
            });

            // --- 控制列按鈕功能綁定 ---
            $('#first-page').click(function() { $flipbook.turn('page', 1); });
            $('#last-page').click(function() { $flipbook.turn('page', totalPages); });
            $('#prev-page').click(function() { $flipbook.turn('previous'); });
            $('#next-page').click(function() { $flipbook.turn('next'); });
            
            // 全螢幕功能
            $('#fullscreen').click(function() {
                if (!document.fullscreenElement) {
                    document.documentElement.requestFullscreen();
                } else {
                    if (document.exitFullscreen) {
                        document.exitFullscreen();
                    }
                }
            });

        }).catch(function(error) {
            $('#loading').html('<i class="fas fa-exclamation-triangle" style="color:ff4a4a;"></i><br>PDF 載入失敗，請檢查檔名是否為 my-book.pdf');
            console.error(error);
        });
    </script>

</body>
</html>
