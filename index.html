<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>可樂旅遊-迪士尼探險號手冊</title>
    
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/turn.js/3/turn.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        html, body {
            margin: 0;
            padding: 0;
            height: 100%;
            background: radial-gradient(circle, #333333 0%, #111111 100%);
            font-family: "Helvetica Neue", Helvetica, Arial, sans-serif;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        h1 {
            color: #fff;
            font-size: 16px;
            text-align: center;
            margin: 8px 0 2px 0;
            font-weight: 300;
            letter-spacing: 1px;
        }

        /* 主書本顯示區 */
        .container {
            flex: 1;
            overflow: auto; 
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
            padding: 10px;
            user-select: none;
        }

        #book-wrapper {
            position: relative;
            margin: auto;
        }

        #flipbook {
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.7);
            display: none; 
            transition: transform 0.1s ease-out;
        }
        
        .page {
            background-color: white;
        }

        canvas {
            width: 100%;
            height: 100%;
            display: block;
        }

        /* 🎞️ 仿截圖：橫向微縮圖導覽列外殼 */
        .thumbnail-bar-container {
            height: 95px;
            background: rgba(20, 20, 20, 0.95);
            display: flex;
            align-items: center;
            padding: 0 10px;
            border-top: 1px solid rgba(255,255,255,0.08);
            z-index: 10;
        }

        /* 微縮圖捲動軌道 */
        .thumbnail-track {
            flex: 1;
            overflow-x: auto;
            white-space: nowrap;
            scroll-behavior: smooth;
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 5px 0;
        }
        /* 隱藏原生捲動軸讓視覺更乾淨 */
        .thumbnail-track::-webkit-scrollbar { display: none; }
        .thumbnail-track { -ms-overflow-style: none; scrollbar-width: none; }

        /* 單個微縮圖元件 (完美 A4 比例不變形) */
        .thumb-item {
            display: inline-block;
            height: 72px;
            width: 51px; /* 72 / 1.414 確保 A4 比例 */
            background: #2b2b2b;
            border: 2px solid transparent;
            border-radius: 4px;
            cursor: pointer;
            transition: all 0.2s ease;
            position: relative;
            flex-shrink: 0;
            box-shadow: 0 4px 10px rgba(0,0,0,0.4);
            overflow: hidden;
        }
        .thumb-item:hover {
            border-color: #666;
        }
        .thumb-item canvas {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        /* 🔴 仿截圖：當前閱讀頁面的「紅色高亮邊框」 */
        .thumb-item.active {
            border-color: #ff3b30; 
            box-shadow: 0 0 12px rgba(255, 59, 48, 0.6);
            transform: scale(1.03);
        }

        /* 微縮圖下方的小頁碼 */
        .thumb-page-num {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            background: rgba(0, 0, 0, 0.65);
            color: #fff;
            font-size: 9px;
            text-align: center;
            padding: 1px 0;
            font-family: monospace;
        }

        /* 導覽列兩側的 `<` 與 `>` 乾淨箭頭 */
        .thumb-nav-btn {
            background: none;
            border: none;
            color: #777;
            font-size: 18px;
            cursor: pointer;
            padding: 15px 8px;
            transition: color 0.2s;
        }
        .thumb-nav-btn:hover { color: #fff; }

        /* 下方工具列 */
        .toolbar {
            height: 50px;
            background: rgba(15, 15, 15, 0.98);
            border-top: 1px solid rgba(255,255,255,0.05);
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 15px;
            color: #bbb;
            user-select: none;
            z-index: 10;
            padding: 0 15px;
        }

        .btn {
            background: none;
            border: none;
            color: #aaa;
            font-size: 15px;
            cursor: pointer;
            padding: 8px 10px;
            border-radius: 4px;
            transition: all 0.2s;
        }
        .btn:hover {
            color: #fff;
            background: rgba(255, 255, 255, 0.08);
        }
        .btn-zoom { color: #00adb5; }
        .btn-zoom:hover { color: #00fff6; }

        .page-info {
            font-size: 13px;
            font-weight: bold;
            letter-spacing: 0.5px;
            white-space: nowrap;
            min-width: 70px;
            text-align: center;
        }

        .slider-container {
            flex: 1;
            max-width: 200px;
            display: flex;
            align-items: center;
        }
        #page-slider {
            width: 100%;
            height: 4px;
            background: #333;
            border-radius: 2px;
            outline: none;
            accent-color: #ff3b30;
            cursor: pointer;
        }

        .divider { width: 1px; height: 14px; background: rgba(255,255,255,0.15); }

        #loading {
            position: absolute;
            color: #fff;
            text-align: center;
        }
        #loading i { font-size: 30px; margin-bottom: 10px; color: #ff3b30; }

        @media (max-width: 767px) {
            .slider-container, .divider { display: none; }
            .thumbnail-bar-container { height: 80px; }
            .thumb-item { height: 58px; width: 41px; }
        }
    </style>
</head>
<body>

    <h1>可樂旅遊-迪士尼探險號手冊</h1>

    <div class="container">
        <div id="loading">
            <i class="fas fa-spinner fa-spin"></i>
            <div>載入中...</div>
        </div>
        <div id="book-wrapper">
            <div id="flipbook"></div>
        </div>
    </div>

    <div class="thumbnail-bar-container">
        <button class="thumb-nav-btn" id="thumb-prev"><i class="fas fa-chevron-left"></i></button>
        <div class="thumbnail-track" id="thumbnail-track">
            </div>
        <button class="thumb-nav-btn" id="thumb-next"><i class="fas fa-chevron-right"></i></button>
    </div>

    <div class="toolbar">
        <button class="btn" id="prev-page" title="上一頁"><i class="fas fa-chevron-left"></i></button>
        
        <div class="slider-container">
            <input type="range" id="page-slider" min="1" max="1" value="1">
        </div>

        <span class="page-info"><span id="current-page">1</span> / <span id="total-pages">0</span></span>
        
        <button class="btn" id="next-page" title="下一頁"><i class="fas fa-chevron-right"></i></button>
        
        <div class="divider"></div>
        <button class="btn btn-zoom" id="zoom-out" title="縮小"><i class="fas fa-magnifying-glass-minus"></i></button>
        <button class="btn btn-zoom" id="zoom-in" title="放大"><i class="fas fa-magnifying-glass-plus"></i></button>
        <div class="divider"></div>
        <button class="btn" id="fullscreen" title="全螢幕"><i class="fas fa-expand"></i></button>
    </div>

    <script>
        pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

        const pdfUrl = 'DLC.pdf'; // 👈 記得確保你的 PDF 檔名正確
        
        const isMobile = window.innerWidth < 768;
        let bookWidth, bookHeight;

        if (isMobile) {
            const maxWidth = window.innerWidth - 20;   
            const maxHeight = window.innerHeight - 180; 
            bookWidth = maxWidth;
            bookHeight = bookWidth * 1.414; 
            if (bookHeight > maxHeight) {
                bookHeight = maxHeight;
                bookWidth = bookHeight / 1.414;
            }
        } else {
            bookWidth = 848;  
            bookHeight = 600; 
        }

        $('#book-wrapper, #flipbook').css({ 'width': bookWidth + 'px', 'height': bookHeight + 'px' });
        const singlePageWidth = isMobile ? bookWidth : (bookWidth / 2);
        $('head').append(`<style>.page { width: ${singlePageWidth}px !important; height: ${bookHeight}px !important; }</style>`);

        // 載入 PDF 主執行緒
        pdfjsLib.getDocument(pdfUrl).promise.then(async function(pdf) {
            const totalPages = pdf.numPages;
            $('#total-pages').text(totalPages);
            $('#page-slider').attr('max', totalPages);
            
            const $flipbook = $('#flipbook');
            const $thumbTrack = $('#thumbnail-track');

            // --- ⚙️ 1. 產生主要翻頁面 ＆ 產生下方橫向微縮圖元件 ---
            for (let pageNum = 1; pageNum <= totalPages; pageNum++) {
                // A. 建立書本頁面
                const $pageDiv = $('<div class="page"></div>');
                if(!isMobile && (pageNum === 1 || pageNum === totalPages)) { $pageDiv.addClass('hard'); }
                const mainCanvas = document.createElement('canvas');
                $pageDiv.append(mainCanvas);
                $flipbook.append($pageDiv);

                // B. 建立微縮導覽列單元
                const $thumbItem = $(`
                    <div class="thumb-item" data-page="${pageNum}">
                        <canvas id="thumb-canvas-${pageNum}"></canvas>
                        <div class="thumb-page-num">${pageNum}</div>
                    </div>
                `);
                $thumbTrack.append($thumbItem);

                // 點擊微縮圖直接智慧跳頁
                $thumbItem.click(function() {
                    $flipbook.turn('page', pageNum);
                });

                // C. 渲染主頁面 (高解析度)
                const page = await pdf.getPage(pageNum);
                const viewport = page.getViewport({ scale: 1.8 }); 
                const context = mainCanvas.getContext('2d');
                mainCanvas.height = viewport.height;
                mainCanvas.width = viewport.width;
                await page.render({ canvasContext: context, viewport: viewport }).promise;

                // D. 非同步渲染微縮圖 (超低解析度、秒開、完全不卡主畫面)
                const thumbCanvas = document.getElementById(`thumb-canvas-${pageNum}`);
                const thumbContext = thumbCanvas.getContext('2d');
                const thumbViewport = page.getViewport({ scale: 0.12 });
                thumbCanvas.width = thumbViewport.width;
                thumbCanvas.height = thumbViewport.width * 1.414; // 鎖定比例絕不變形
                page.render({ canvasContext: thumbContext, viewport: thumbViewport });
            }

            $('#loading').hide();
            
            // 初始化 Turn.js
            $flipbook.show().turn({
                width: bookWidth,      
                height: bookHeight,     
                display: isMobile ? 'single' : 'double', 
                autoCenter: true,
                duration: 500,  
                gradients: true, 
                when: {
                    turned: function(event, page, view) {
                        // 同步拉桿位置
                        $('#page-slider').val(page); 
                        
                        // 📄 仿截圖：智慧格式化跨頁文字 (例：6-7 / 30)
                        if (!isMobile && view[0] !== 0 && view[1] !== 0 && view[0] !== view[1]) {
                            $('#current-page').text(`${view[0]}-${view[1]}`);
                        } else {
                            $('#current-page').text(page);
                        }

                        // 🔴 同步高亮紅色邊框
                        $('.thumb-item').removeClass('active');
                        view.forEach(p => {
                            if (p !== 0) {
                                const $activeThumb = $(`.thumb-item[data-page="${p}"]`);
                                $activeThumb.addClass('active');

                                // 智慧置中功能：當翻頁時，下方軌道會自動將紅框圖平滑滑動到中央視角
                                if (p === view[0]) {
                                    const trackEl = document.getElementById('thumbnail-track');
                                    const thumbEl = $activeThumb[0];
                                    if (thumbEl) {
                                        const targetScroll = thumbEl.offsetLeft - (trackEl.clientWidth / 2) + (thumbEl.clientWidth / 2);
                                        trackEl.scrollTo({ left: targetScroll, behavior: 'smooth' });
                                    }
                                }
                            }
                        });
                    }
                }
            });

            // 微縮圖導覽列的兩側 `<` 與 `>` 手動捲動功能
            $('#thumb-prev').click(function() {
                document.getElementById('thumbnail-track').scrollBy({ left: -200, behavior: 'smooth' });
            });
            $('#thumb-next').click(function() {
                document.getElementById('thumbnail-track').scrollBy({ left: 200, behavior: 'smooth' });
            });

            // 進度條拉桿手動釋放時跳頁
            $('#page-slider').on('change', function() {
                $flipbook.turn('page', parseInt($(this).val()));
            });


            // --- 🔍 2. 中心點視角縮放 + 小手直接抓取移動核心邏輯 ---
            let zoomLevel = 1.0;
            const maxZoom = 2.5, minZoom = 1.0, zoomStep = 0.3; 
            const $container = $('.container');

            function applyViewportCenteredZoom(delta) {
                const oldZoom = zoomLevel;
                zoomLevel += delta;
                if (zoomLevel > maxZoom) zoomLevel = maxZoom;
                if (zoomLevel < minZoom) zoomLevel = minZoom;
                if (oldZoom === zoomLevel) return;

                const currentCenterX = $container.scrollLeft() + $container.width() / 2;
                const currentCenterY = $container.scrollTop() + $container.height() / 2;

                $('#flipbook').css({ 'transform': `scale(${zoomLevel})`, 'transform-origin': 'top left' });
                $('#book-wrapper').css({ 'width': (bookWidth * zoomLevel) + 'px', 'height': (bookHeight * zoomLevel) + 'px' });

                const ratio = zoomLevel / oldZoom;
                $container.scrollLeft(currentCenterX * ratio - $container.width() / 2);
                $container.scrollTop(currentCenterY * ratio - $container.height() / 2);

                if (zoomLevel > 1.0) {
                    $flipbook.turn('disable', true); // 放大時鎖定翻頁，防拖曳誤翻
                    $container.css('cursor', 'grab');
                } else {
                    $flipbook.turn('disable', false); // 縮回時解鎖
                    $container.css('cursor', 'default');
                    $container.scrollLeft(0).scrollTop(0);
                }
            }

            $('#zoom-in').click(function() { applyViewportCenteredZoom(zoomStep); });
            $('#zoom-out').click(function() { applyViewportCenteredZoom(-zoomStep); });

            // 🖐️ 滑鼠小手抓取拖曳
            let isDragging = false;
            let startX, startY, scrollLeft, scrollTop;

            $container.on('mousedown', function(e) {
                if (zoomLevel <= 1.0) return;
                isDragging = true;
                $container.css('cursor', 'grabbing');
                startX = e.pageX - $container.offset().left;
                startY = e.pageY - $container.offset().top;
                scrollLeft = $container.scrollLeft();
                scrollTop = $container.scrollTop();
            });

            $(window).on('mousemove', function(e) {
                if (!isDragging) return;
                e.preventDefault();
                const x = e.pageX - $container.offset().left;
                const y = e.pageY - $container.offset().top;
                $container.scrollLeft(scrollLeft - (x - startX) * 1.5);
                $container.scrollTop(scrollTop - (y - startY) * 1.5);
            });
