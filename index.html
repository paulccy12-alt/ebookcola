<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>可樂旅遊-迪士尼探險號手冊</title>
    
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/turn.js/3/turn.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        html, body {
            margin: 0;
            padding: 0;
            height: 100%;
            background: radial-gradient(circle, #444444 0%, #111111 100%);
            font-family: "Helvetica Neue", Helvetica, Arial, sans-serif;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        h1 {
            color: #fff;
            font-size: 18px;
            text-align: center;
            margin: 10px 0 0 0;
            font-weight: 300;
        }

        /* 主畫面區塊：允許內容過大時捲動 */
        .container {
            flex: 1;
            overflow: auto; 
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
            padding: 10px;
            user-select: none; /* 防止拖曳時選取到藍色文字塊 */
        }

        #book-wrapper {
            position: relative;
            margin: auto;
        }

        #flipbook {
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.6);
            display: none; 
            transition: transform 0.1s ease-out;
        }
        
        .page {
            background-color: white;
        }

        canvas {
            width: 100%;
            height: 100%;
            display: block;
        }

        /* 下方控制列 */
        .toolbar {
            height: 60px;
            background: rgba(20, 20, 20, 0.95);
            backdrop-filter: blur(10px);
            border-top: 1px solid rgba(255,255,255,0.1);
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 12px;
            color: #ccc;
            user-select: none;
            z-index: 10;
            padding: 0 15px;
        }

        .btn {
            background: none;
            border: none;
            color: #ccc;
            font-size: 16px;
            cursor: pointer;
            padding: 10px 12px;
            border-radius: 5px;
            transition: all 0.2s ease;
        }

        .btn:hover {
            color: #fff;
            background: rgba(255, 255, 255, 0.1);
        }
        
        .btn-zoom { color: #00adb5; }
        .btn-zoom:hover { color: #00fff6; }

        .page-info {
            font-size: 13px;
            letter-spacing: 1px;
            white-space: nowrap;
        }

        /* 💾 智慧進度條拖拉區塊 */
        .slider-container {
            flex: 1;
            max-width: 250px;
            display: flex;
            align-items: center;
            margin: 0 5px;
        }

        #page-slider {
            width: 100%;
            height: 6px;
            background: #333;
            border-radius: 3px;
            outline: none;
            accent-color: #00adb5; /* 現代瀏覽器拉桿顏色 */
            cursor: pointer;
        }

        /* 📄 浮動微縮預覽視窗 (絕對不變形) */
        #preview-container {
            position: absolute;
            bottom: 75px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(15, 15, 15, 0.9);
            border: 2px solid #00adb5;
            border-radius: 8px;
            padding: 6px;
            display: none;
            box-shadow: 0 15px 35px rgba(0,0,0,0.7);
            z-index: 100;
            pointer-events: none; /* 穿透事件，防止阻擋滑鼠 */
            text-align: center;
        }

        #preview-canvas {
            max-width: 110px;
            max-height: 155px; /* 精準限制高度，寬度隨 PDF 比例自動縮放，絕不變形 */
            display: block;
            border-radius: 4px;
            background: #fff;
        }

        #preview-page-num {
            color: #00adb5;
            font-size: 12px;
            margin-top: 5px;
            font-weight: bold;
        }

        .divider {
            width: 1px;
            height: 15px;
            background: rgba(255,255,255,0.2);
        }

        #loading {
            position: absolute;
            color: #fff;
            font-size: 16px;
            text-align: center;
        }
        #loading i {
            font-size: 35px;
            margin-bottom: 15px;
            color: #00adb5;
        }

        @media (max-width: 767px) {
            #first-page, #last-page, .divider { display: none; }
            .slider-container { max-width: 130px; }
            h1 { font-size: 15px; }
        }
    </style>
</head>
<body>

    <h1>可樂旅遊-迪士尼探險號手冊</h1>

    <div class="container">
        <div id="loading">
            <i class="fas fa-spinner fa-spin"></i>
            <div>載入中...</div>
        </div>
        
        <div id="book-wrapper">
            <div id="flipbook"></div>
        </div>
    </div>

    <div id="preview-container">
        <canvas id="preview-canvas"></canvas>
        <div id="preview-page-num">第 1 頁</div>
    </div>

    <div class="toolbar">
        <button class="btn" id="first-page" title="回到封面"><i class="fas fa-angles-left"></i></button>
        <button class="btn" id="prev-page" title="上一頁"><i class="fas fa-chevron-left"></i></button>
        
        <div class="slider-container">
            <input type="range" id="page-slider" min="1" max="1" value="1">
        </div>

        <span class="page-info"><span id="current-page">1</span> / <span id="total-pages">0</span></span>
        
        <button class="btn" id="next-page" title="下一頁"><i class="fas fa-chevron-right"></i></button>
        <button class="btn" id="last-page" title="移至封底"><i class="fas fa-angles-right"></i></button>
        
        <div class="divider"></div>
        
        <button class="btn btn-zoom" id="zoom-out" title="縮小"><i class="fas fa-magnifying-glass-minus"></i></button>
        <button class="btn btn-zoom" id="zoom-in" title="放大"><i class="fas fa-magnifying-glass-plus"></i></button>
        
        <div class="divider"></div>
        
        <button class="btn" id="fullscreen" title="全螢幕"><i class="fas fa-expand"></i></button>
    </div>

    <script>
        pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

        const pdfUrl = 'DLC.pdf'; 
        
        const isMobile = window.innerWidth < 768;
        let bookWidth, bookHeight;

        if (isMobile) {
            const maxWidth = window.innerWidth - 20;   
            const maxHeight = window.innerHeight - 130; 
            bookWidth = maxWidth;
            bookHeight = bookWidth * 1.414; 
            if (bookHeight > maxHeight) {
                bookHeight = maxHeight;
                bookWidth = bookHeight / 1.414;
            }
        } else {
            bookWidth = 848;  
            bookHeight = 600; 
        }

        $('#book-wrapper, #flipbook').css({ 'width': bookWidth + 'px', 'height': bookHeight + 'px' });
        const singlePageWidth = isMobile ? bookWidth : (bookWidth / 2);
        $('head').append(`<style>.page { width: ${singlePageWidth}px !important; height: ${bookHeight}px !important; }</style>`);

        let globalPdf = null; // 儲存 pdf 物件供預覽功能使用

        // 載入 PDF
        pdfjsLib.getDocument(pdfUrl).promise.then(async function(pdf) {
            globalPdf = pdf;
            const totalPages = pdf.numPages;
            $('#total-pages').text(totalPages);
            $('#page-slider').attr('max', totalPages); // 設定拉桿最大頁數
            
            const $flipbook = $('#flipbook');

            for (let pageNum = 1; pageNum <= totalPages; pageNum++) {
                const $pageDiv = $('<div class="page"></div>');
                if(!isMobile && (pageNum === 1 || pageNum === totalPages)) {
                    $pageDiv.addClass('hard'); 
                }
                const canvas = document.createElement('canvas');
                $pageDiv.append(canvas);
                $flipbook.append($pageDiv);

                const page = await pdf.getPage(pageNum);
                const viewport = page.getViewport({ scale: 2.0 }); 
                const context = canvas.getContext('2d');
                canvas.height = viewport.height;
                canvas.width = viewport.width;

                const renderContext = { canvasContext: context, viewport: viewport };
                await page.render(renderContext).promise;
            }

            $('#loading').hide();
            
            // 初始化 Turn.js
            $flipbook.show().turn({
                width: bookWidth,      
                height: bookHeight,     
                display: isMobile ? 'single' : 'double', 
                autoCenter: true,
                elevation: isMobile ? 0 : 50, 
                duration: 600,  
                gradients: true, 
                when: {
                    turned: function(event, page, view) {
                        $('#current-page').text(page);
                        $('#page-slider').val(page); // 翻頁時同步拉桿位置
                    }
                }
            });

            // --- ⚙️ 1. 進度條拖拉與不變形預覽核心邏輯 ---
            let previewRenderTask = null;
            let lastPreviewPage = 0;

            function renderPreviewThumb(pageNum) {
                if (pageNum === lastPreviewPage || !globalPdf) return;
                lastPreviewPage = pageNum;

                // 如果前一個預覽還在渲染，先取消它，避免累加卡頓
                if (previewRenderTask) { previewRenderTask.cancel(); }

                globalPdf.getPage(pageNum).then(function(page) {
                    const canvas = document.getElementById('preview-canvas');
                    const context = canvas.getContext('2d');
                    
                    // 以低解析度渲染微縮圖
                    const viewport = page.getViewport({ scale: 0.25 });
                    canvas.width = viewport.width;
                    canvas.height = viewport.width * 1.414; // 強制標準 A4 渲染比例，絕不變形

                    const renderContext = { canvasContext: context, viewport: viewport };
                    previewRenderTask = page.render(renderContext);
                    previewRenderTask.promise.catch(function(err) { /* 忽略取消錯誤 */ });
                });

                $('#preview-page-num').text(`第 ${pageNum} 頁`);
            }

            // 監聽拉桿拖移中
            $('#page-slider').on('input', function() {
                const pageNum = parseInt($(this).val());
                renderPreviewThumb(pageNum);

                // 計算動態跟隨：讓預覽視窗完美的跟著拉桿按鈕移動
                const slider = $(this);
                const width = slider.width();
                const min = parseInt(slider.attr('min'));
                const max = parseInt(slider.attr('max'));
                const percent = (slider.val() - min) / (max - min);
                const thumbPosition = slider.offset().left + (width * percent);

                $('#preview-container').css({ 'left': thumbPosition + 'px', 'display': 'block' });
            });

            // 監聽釋放拉桿：確認放開時才正式跳頁
            $('#page-slider').on('change', function() {
                const pageNum = parseInt($(this).val());
                $flipbook.turn('page', pageNum);
            });

            // 隱藏預覽視窗
            $('#page-slider').on('mouseup touchend mouseleave', function() {
                $('#preview-container').hide();
                lastPreviewPage = 0;
            });


            // --- 🔍 2. 中心點視角縮放 + 小手直接抓取移動核心邏輯 ---
            let zoomLevel = 1.0;
            const maxZoom = 2.5; 
            const minZoom = 1.0; 
            const zoomStep = 0.3; 
            const $container = $('.container');

            function applyViewportCenteredZoom(delta) {
                const oldZoom = zoomLevel;
                zoomLevel += delta;
                if (zoomLevel > maxZoom) zoomLevel = maxZoom;
                if (zoomLevel < minZoom) zoomLevel = minZoom;
                if (oldZoom === zoomLevel) return;

                // A. 抓取縮放前，使用者眼睛正在看的「中心點」相對位置
                const currentCenterX = $container.scrollLeft() + $container.width() / 2;
                const currentCenterY = $container.scrollTop() + $container.height() / 2;

                // B. 進行畫面等比放大 (改為 top left 起點便於精準計算捲動軸)
                $('#flipbook').css({
                    'transform': `scale(${zoomLevel})`,
                    'transform-origin': 'top left'
                });
                $('#book-wrapper').css({
                    'width': (bookWidth * zoomLevel) + 'px',
                    'height': (bookHeight * zoomLevel) + 'px'
                });

                // C. 關鍵重算：將捲動軸移至對應的比例，完美實現「從中央放大」
                const ratio = zoomLevel / oldZoom;
                $container.scrollLeft(currentCenterX * ratio - $container.width() / 2);
                $container.scrollTop(currentCenterY * ratio - $container.height() / 2);

                // D. 智慧狀態切換：放大時開啟小手抓取，並「鎖定」Turn.js 翻頁，避免拖曳時誤翻
                if (zoomLevel > 1.0) {
                    $flipbook.turn('disable', true); // 鎖定滑鼠翻頁
                    $container.css('cursor', 'grab'); // 顯示小手
                } else {
                    $flipbook.turn('disable', false); // 解鎖翻頁
                    $container.css('cursor', 'default');
                    $container.scrollLeft(0).scrollTop(0); // 縮回 1 倍時回正
                }
            }

            $('#zoom-in').click(function() { applyViewportCenteredZoom(zoomStep); });
            $('#zoom-out').click(function() { applyViewportCenteredZoom(-zoomStep); });

            // 🖐️ 滑鼠小手拖曳（Drag to Scroll）邏輯
            let isDragging = false;
            let startX, startY, scrollLeft, scrollTop;

            $container.on('mousedown', function(e) {
                if (zoomLevel <= 1.0) return;
                // 排除點擊到控制列的情況
                if ($(e.target).closest('.toolbar').length) return;

                isDragging = true;
                $container.css('cursor', 'grabbing'); // 抓取時變成握拳小手
                startX = e.pageX - $container.offset().left;
                startY = e.pageY - $container.offset().top;
                scrollLeft = $container.scrollLeft();
                scrollTop = $container.scrollTop();
            });

            $(window).on('mousemove', function(e) {
                if (!isDragging) return;
                e.preventDefault();
                const x = e.pageX - $container.offset().left;
                const y = e.pageY - $container.offset().top;
                const walkX = (x - startX) * 1.5; // 1.5 為移動速度靈敏度
                const walkY = (y - startY) * 1.5;
                $container.scrollLeft(scrollLeft - walkX);
                $container.scrollTop(scrollTop - walkY);
            });

            $(window).on('mouseup', function() {
                if (isDragging) {
                    isDragging = false;
                    $container.css('cursor', zoomLevel > 1.0 ? 'grab' : 'default');
                }
            });

            // 📱 手機版單指拖曳（Touch to Scroll）支援
            $container.on('touchstart', function(e) {
                if (zoomLevel <= 1.0) return;
                isDragging = true;
                const touch = e.originalEvent.touches[0];
                startX = touch.pageX - $container.offset().left;
                startY = touch.pageY - $container.offset().top;
                scrollLeft = $container.scrollLeft();
                scrollTop = $container.scrollTop();
            });

            $container.on('touchmove', function(e) {
                if (!isDragging) return;
                const touch = e.originalEvent.touches[0];
                const x = touch.pageX - $container.offset().left;
                const y = touch.pageY - $container.offset().top;
                const walkX = (x - startX) * 1.5;
                const walkY = (y - startY) * 1.5;
                $container.scrollLeft(scrollLeft - walkX);
                $container.scrollTop(scrollTop - walkY);
            });

            $container.on('touchend', function() { isDragging = false; });


            // --- 其他基礎控制 ---
            $('#first-page').click(function() { $flipbook.turn('page', 1); });
            $('#last-page').click(function() { $flipbook.turn('page', totalPages); });
            $('#prev-page').click(function() { $flipbook.turn('previous'); });
            $('#next-page').click(function() { $flipbook.turn('next'); });
            
            $('#fullscreen').click(function() {
                if (!document.fullscreenElement) {
                    document.documentElement.requestFullscreen();
                } else {
                    if (document.exitFullscreen) { document.exitFullscreen(); }
                }
            });

        }).catch(function(error) {
            $('#loading').html('<i class="fas fa-exclamation-triangle" style="color:ff4a4a;"></i><br>PDF 載入失敗');
            console.error(error);
        });
    </script>

</body>
</html>
