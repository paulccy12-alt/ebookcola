<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>可樂旅遊－迪士尼探險號旅遊手冊</title>
    
    <style>
        html, body {
            margin: 0;
            padding: 0;
            height: 100%;
            background: radial-gradient(circle, #444444 0%, #111111 100%);
            font-family: "Helvetica Neue", Helvetica, Arial, sans-serif;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        h1 {
            color: #fff;
            font-size: 18px;
            text-align: center;
            margin: 10px 0 0 0;
            font-weight: 300;
        }

        .container {
            flex: 1;
            /* 關鍵修正：改為 hidden，由 CSS translate 接管拖曳，防止瀏覽器鎖死左側捲軸 */
            overflow: hidden; 
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
            padding: 10px;
        }

        #book-wrapper {
            position: relative;
            margin: auto;
            /* 啟用硬體加速，讓縮放平移更絲滑 */
            will-change: transform; 
        }

        #flipbook {
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.6);
            display: none; 
        }
        
        .page {
            background-color: white;
            position: relative;
        }

        canvas {
            width: 100%;
            height: 100%;
            display: block;
        }

        .thumbnail-container {
            display: none;
            height: 120px;
            background: rgba(25, 25, 25, 0.95);
            backdrop-filter: blur(10px);
            border-top: 1px solid rgba(255, 255, 255, 0.1);
            overflow-x: auto;
            overflow-y: hidden;
            white-space: nowrap;
            padding: 10px;
            box-sizing: border-box;
            align-items: center;
            z-index: 9;
        }

        .thumbnail-container::-webkit-scrollbar {
            height: 6px;
        }
        .thumbnail-container::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.2);
            border-radius: 3px;
        }

        .thumb-item {
            display: inline-flex;
            height: 100%;
            margin: 0 6px;
            cursor: pointer;
            border: 2px solid transparent;
            border-radius: 4px;
            overflow: hidden;
            box-sizing: border-box;
            transition: all 0.2s ease;
            background: rgba(255, 255, 255, 0.05);
            box-shadow: 0 4px 10px rgba(0,0,0,0.5);
            flex-shrink: 0; 
            min-width: 60px;
            justify-content: center;
            align-items: center;
        }

        .thumb-item:hover {
            border-color: rgba(255, 255, 255, 0.5);
        }

        .thumb-item.active {
            border-color: #ff4a4a;
            box-shadow: 0 0 10px rgba(255, 74, 74, 0.6);
        }

        .thumb-canvas {
            height: 100%;
            width: auto;
            display: block;
        }

        .toolbar {
            height: 60px;
            background: rgba(20, 20, 20, 0.95);
            backdrop-filter: blur(10px);
            border-top: 1px solid rgba(255,255,255,0.1);
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
            color: #ccc;
            user-select: none;
            z-index: 10;
            padding: 0 15px;
        }

        .progress-container {
            flex: 1;
            display: flex;
            align-items: center;
            margin: 0 15px;
            min-width: 100px;
        }

        #page-slider {
            -webkit-appearance: none;
            appearance: none;
            width: 100%;
            height: 4px;
            background: rgba(255, 255, 255, 0.2);
            border-radius: 2px;
            outline: none;
            cursor: pointer;
            transition: background 0.3s;
        }

        #page-slider:hover {
            background: rgba(255, 255, 255, 0.4);
        }

        #page-slider::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            width: 14px;
            height: 14px;
            border-radius: 50%;
            background: #ffffff;
            cursor: pointer;
            box-shadow: 0 0 5px rgba(0, 0, 0, 0.5);
            transition: transform 0.1s ease;
        }
        #page-slider::-webkit-slider-thumb:hover {
            transform: scale(1.25);
        }

        .btn {
            background: none;
            border: none;
            color: #ccc;
            font-size: 16px;
            cursor: pointer;
            padding: 10px 12px;
            border-radius: 5px;
            transition: all 0.2s ease;
            flex-shrink: 0;
        }

        .btn:hover {
            color: #fff;
            background: rgba(255, 255, 255, 0.1);
        }
        
        .btn-zoom { color: #00adb5; }
        .btn-zoom:hover { color: #00fff6; }

        .page-info {
            font-size: 13px;
            letter-spacing: 1px;
            white-space: nowrap;
            flex-shrink: 0;
        }

        .divider {
            width: 1px;
            height: 15px;
            background: rgba(255,255,255,0.2);
            flex-shrink: 0;
        }

        #loading {
            position: absolute;
            color: #fff;
            font-size: 16px;
            text-align: center;
            max-width: 80%;
            line-height: 1.6;
            z-index: 99;
        }
        #loading i {
            font-size: 35px;
            margin-bottom: 15px;
            color: #00adb5;
        }
        .error-hint {
            color: #ff6b6b;
            font-size: 13px;
            margin-top: 10px;
            background: rgba(0,0,0,0.4);
            padding: 10px;
            border-radius: 5px;
            text-align: left;
            line-height: 1.5;
        }

        .page-spinner {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            color: #999;
            font-size: 20px;
        }

        @media (max-width: 767px) {
            #first-page, #last-page, .divider {
                display: none; 
            }
            .toolbar { gap: 5px; padding: 0 10px; }
            .progress-container { margin: 0 8px; }
            h1 { font-size: 15px; }
        }
    </style>

    <script>
        function showError(htmlContent) {
            var icon = document.getElementById('loading-icon');
            var text = document.getElementById('loading-text');
            if (icon) {
                icon.className = 'fas fa-exclamation-triangle';
                icon.style.color = '#ff4a4a';
                icon.style.animation = 'none';
            }
            if (text) { text.innerHTML = htmlContent; }
        }
        function updateLoadingStatus(msg) {
            var text = document.getElementById('loading-text');
            if (text) { text.innerHTML = msg; }
        }

        window.addEventListener('error', function(e) {
            if (e.target && (e.target.tagName === 'SCRIPT' || e.target.tagName === 'LINK')) {
                var url = e.target.src || e.target.href;
                showError('<b>網路核心套件載入失敗！</b><br><span style="font-size:12px; color:#aaa;">無法讀取: ' + url + '</span><br>' +
                          '<div class="error-hint"><b>💡 可能原因：</b><br>' +
                          '您的網路環境、公司安全防火牆或防毒軟體封鎖了 cdnjs 伺服器。<br>' +
                          '<b>🛠️ 解決方法：</b>請嘗試將電腦<b>切換至手機熱點網路</b>，或更換執行環境再重新整理。</div>');
            }
        }, true);

        window.onerror = function(msg, url, line) {
            showError('<b>JavaScript 執行錯誤:</b><br>' + msg + '<br><span style="font-size:12px; color:#aaa;">錯誤位置: 行數 ' + line + '</span>');
            return false;
        };
    </script>

    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/turn.js/3/turn.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>

    <h1>可樂旅遊－迪士尼探險號旅遊手冊</h1>

    <div class="container">
        <div id="loading">
            <i class="fas fa-spinner fa-spin" id="loading-icon"></i>
            <div id="loading-text">系統初始化中...</div>
        </div>
        
        <div id="book-wrapper">
            <div id="flipbook"></div>
        </div>
    </div>

    <div class="thumbnail-container" id="thumbnail-container"></div>

    <div class="toolbar">
        <button class="btn" id="first-page" title="回到封面"><i class="fas fa-angles-left"></i></button>
        <button class="btn" id="prev-page" title="上一頁"><i class="fas fa-chevron-left"></i></button>
        
        <span class="page-info"><span id="current-page">1</span> / <span id="total-pages">0</span></span>
        
        <button class="btn" id="next-page" title="下一頁"><i class="fas fa-chevron-right"></i></button>
        <button class="btn" id="last-page" title="移至封底"><i class="fas fa-angles-right"></i></button>
        
        <div class="divider"></div>
        
        <div class="progress-container">
            <input type="range" id="page-slider" min="1" max="1" value="1" title="拖動跳頁">
        </div>
        
        <div class="divider"></div>
        
        <button class="btn btn-zoom" id="zoom-out" title="縮小"><i class="fas fa-magnifying-glass-minus"></i></button>
        <button class="btn btn-zoom" id="zoom-in" title="放大"><i class="fas fa-magnifying-glass-plus"></i></button>
        
        <div class="divider"></div>
        
        <button class="btn" id="fullscreen" title="全螢幕"><i class="fas fa-expand"></i></button>
        
        <div class="divider"></div>
        <button class="btn" id="toggle-thumbnails" title="頁面預覽"><i class="fas fa-th-large"></i></button>
    </div>

    <script>
        const pdfUrl = 'DLC.pdf'; 
        const isMobile = window.innerWidth < 768;
        let bookWidth, bookHeight;

        if (window.location.protocol === 'file:') {
            showError('偵測到您直接雙擊打開了 HTML 檔案。<br>' +
                      '由於現代瀏覽器的安全隱私限制（CORS），本機網頁被禁止讀取檔案。<br>' +
                      '<div class="error-hint"><b>💡 快速解決方法：</b><br>' +
                      '1. 在 VS Code 中，對此 HTML 檔案按右鍵選擇 <b>Open with Live Server</b> 開啟。<br>' +
                      '2. 或直接將此專案資料夾上傳至網頁伺服器（如 GitHub Pages）再打開網址。</div>');
        } else {
            updateLoadingStatus('正在初始化 PDF 解碼核心...');
            
            try {
                pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
            } catch(e) {
                showError('PDF.js 解碼組件初始化失敗。');
            }

            // 計算基礎尺寸
            if (isMobile) {
                const maxWidth = window.innerWidth - 20;   
                const maxHeight = window.innerHeight - 130; 
                bookWidth = maxWidth;
                bookHeight = bookWidth * 1.414; 
                if (bookHeight > maxHeight) {
                    bookHeight = maxHeight;
                    bookWidth = bookHeight / 1.414;
                }
            } else {
                bookWidth = 848;  
                bookHeight = 600; 
            }

            $('#book-wrapper, #flipbook').css({ 'width': bookWidth + 'px', 'height': bookHeight + 'px' });
            const singlePageWidth = isMobile ? bookWidth : (bookWidth / 2);
            $('head').append(`<style>.page { width: ${singlePageWidth}px !important; height: ${bookHeight}px !important; }</style>`);

            updateLoadingStatus('正在請求手冊 PDF 檔案 (DLC.pdf)...');

            const loadingTask = pdfjsLib.getDocument(pdfUrl);
            
            loadingTask.onProgress = function(progressData) {
                if (progressData.total > 0) {
                    const percent = Math.round((progressData.loaded / progressData.total) * 100);
                    updateLoadingStatus('正在下載手冊 PDF 檔案... ' + percent + '%');
                } else {
                    updateLoadingStatus('正在下載手冊 PDF 檔案... (' + Math.round(progressData.loaded / 1024) + ' KB)');
                }
            };

            loadingTask.promise.then(async function(pdf) {
                updateLoadingStatus('下載完成！正在建立電子書目錄...');
                const totalPages = pdf.numPages;
                $('#total-pages').text(totalPages);
                $('#page-slider').attr('max', totalPages);

                const $flipbook = $('#flipbook');
                const views = [];
                if (isMobile) {
                    for (let i = 1; i <= totalPages; i++) views.push([i]);
                } else {
                    views.push([1]); 
                    for (let i = 2; i < totalPages; i += 2) {
                        views.push([i, i + 1]); 
                    }
                    if (totalPages % 2 === 0 && totalPages > 1) {
                        views.push([totalPages]); 
                    }
                }

                // 建立預覽圖外殼
                views.forEach((viewPages, index) => {
                    const $thumbItem = $(`<div class="thumb-item" id="thumb-view-${index}"><i class="fas fa-spinner fa-spin" style="color:#555; font-size:12px;"></i></div>`);
                    $thumbItem.data('pages', viewPages);
                    $thumbItem.click(function() { $flipbook.turn('page', viewPages[0]); });
                    $('#thumbnail-container').append($thumbItem);
                });

                // 建立翻頁書預備空頁
                for (let pageNum = 1; pageNum <= totalPages; pageNum++) {
                    const $pageDiv = $('<div class="page"></div>');
                    if(!isMobile && (pageNum === 1 || pageNum === totalPages)) { $pageDiv.addClass('hard'); }
                    $pageDiv.html('<div class="page-spinner"><i class="fas fa-spinner fa-spin"></i></div>');
                    $flipbook.append($pageDiv);
                }

                $('#loading').hide();
                
                $flipbook.show().turn({
                    width: bookWidth,      
                    height: bookHeight,     
                    display: isMobile ? 'single' : 'double', 
                    autoCenter: true,
                    elevation: isMobile ? 0 : 50, 
                    duration: 600,  
                    gradients: true, 
                    when: {
                        turning: function(event, page, view) {
                            view.forEach(p => { if(p > 0) renderPageOnDemand(p); });
                        },
                        turned: function(event, page, view) {
                            $('#current-page').text(page);
                            $('#page-slider').val(page);
                            view.forEach(p => { if(p > 0) renderPageOnDemand(p); });

                            $('.thumb-item').removeClass('active');
                            $('.thumb-item').each(function() {
                                const pages = $(this).data('pages');
                                if (pages && pages.includes(page)) {
                                    $(this).addClass('active');
                                    if ($('#thumbnail-container').css('display') !== 'none') {
                                        this.scrollIntoView({ behavior: 'smooth', block: 'nearest', inline: 'center' });
                                    }
                                }
                            });
                        }
                    }
                });

                // 動態渲染頁面函數
                const renderedPages = {};
                async function renderPageOnDemand(pageNum) {
                    if (renderedPages[pageNum]) return;
                    renderedPages[pageNum] = true;

                    try {
                        const page = await pdf.getPage(pageNum);
                        const $pageDiv = $flipbook.find('.page').eq(pageNum - 1);
                        
                        const canvas = document.createElement('canvas');
                        const viewport = page.getViewport({ scale: 1.5 }); 
                        const context = canvas.getContext('2d');
                        canvas.height = viewport.height;
                        canvas.width = viewport.width;
                        
                        $pageDiv.empty().append(canvas); 
                        await page.render({ canvasContext: context, viewport: viewport }).promise;
                    } catch (err) {
                        console.error('頁面渲染失敗:', pageNum, err);
                    }
                }

                renderPageOnDemand(1);
                if(!isMobile && totalPages > 1) renderPageOnDemand(2);

                // 背景繪製縮圖
                async function startBackgroundThumbnails() {
                    for (let index = 0; index < views.length; index++) {
                        const viewPages = views[index];
                        const $thumbItem = $(`#thumb-view-${index}`);
                        $thumbItem.empty();

                        for (const pNum of viewPages) {
                            try {
                                const page = await pdf.getPage(pNum);
                                const thumbCanvas = document.createElement('canvas');
                                thumbCanvas.className = 'thumb-canvas';
                                $thumbItem.append(thumbCanvas);

                                const thumbViewport = page.getViewport({ scale: 0.15 }); 
                                const thumbContext = thumbCanvas.getContext('2d');
                                thumbCanvas.height = thumbViewport.height;
                                thumbCanvas.width = thumbViewport.width;
                                await page.render({ canvasContext: thumbContext, viewport: thumbViewport }).promise;
                            } catch(e) {
                                console.error('縮圖失敗:', pNum, e);
                            }
                        }
                    }
                }
                startBackgroundThumbnails();

                // ─── 新版核心：2D 矩陣縮放與平移拖曳引擎（全面解決邊界吃字問題） ───
                let zoomLevel = 1.0;
                const maxZoom = 2.5; 
                const minZoom = 1.0; 
                const zoomStep = 0.3; 
                let panX = 0; // 當前平移 X 軸偏移量
                let panY = 0; // 當前平移 Y 軸偏移量
                let isDragging = false;
                let startX, startY;
                const $container = $('.container');

                // 取得滑鼠或手指觸控的精準 XY 座標
                function getEventXY(e) {
                    if (e.originalEvent && e.originalEvent.touches && e.originalEvent.touches.length) {
                        return { x: e.originalEvent.touches[0].pageX, y: e.originalEvent.touches[0].pageY };
                    }
                    return { x: e.pageX, y: e.pageY };
                }

                // 執行縮放與平移渲染函數（含智慧邊界吸附防溢出演算法）
                function applyZoomAndPan() {
                    const containerWidth = $container.width();
                    const containerHeight = $container.height();
                    
                    // 計算放大後，書本超出畫面邊緣的最大平移限度
                    const maxPanX = Math.max(0, (bookWidth * zoomLevel - containerWidth) / 2);
                    const maxPanY = Math.max(0, (bookHeight * zoomLevel - containerHeight) / 2);
                    
                    // 強制將拖動範圍鎖定在安全邊界內，防止往左或往上拉被吃掉
                    panX = Math.max(-maxPanX, Math.min(maxPanX, panX));
                    panY = Math.max(-maxPanY, Math.min(maxPanY, panY));

                    if (zoomLevel > 1.0) {
                        // 放大狀態：強制從正中心點(center center)出發擴張，並套用位移
                        $('#book-wrapper').css({
                            'transform': `translate(${panX}px, ${panY}px) scale(${zoomLevel})`,
                            'transform-origin': 'center center'
                        });
                        $container.css('cursor', 'grab');
                        $flipbook.turn('disable', true); // 放大時禁用翻頁，避免操作衝突
                    } else {
                        // 回歸原大小：清空所有平移狀態，完美解鎖
                        panX = 0;
                        panY = 0;
                        $('#book-wrapper').css({
                            'transform': 'none',
                            'transform-origin': 'center center'
                        });
                        $container.css('cursor', 'default');
                        $flipbook.turn('disable', false); // 解鎖翻頁功能
                    }
                }

                // 點擊放大與縮小
                $('#zoom-in').click(function() {
                    if (zoomLevel < maxZoom) { zoomLevel += zoomStep; applyZoomAndPan(); }
                });
                $('#zoom-out').click(function() {
                    if (zoomLevel > minZoom) { zoomLevel -= zoomStep; applyZoomAndPan(); }
                });

                // 滑鼠/觸控 按下事件
                $container.on('mousedown touchstart', function(e) {
                    if (zoomLevel <= 1.0) return;
                    if ($(e.target).closest('.btn, .toolbar, .thumbnail-container').length) return;
                    
                    if (e.type === 'mousedown') e.preventDefault(); 
                    isDragging = true;
                    $container.css('cursor', 'grabbing');
                    
                    const coords = getEventXY(e);
                    startX = coords.x - panX;
                    startY = coords.y - panY;
                });

                // 滑鼠移動 / 手指拖拉動態演算
                $(document).on('mousemove touchmove', function(e) {
                    if (!isDragging) return;
                    if (e.type === 'touchmove') e.preventDefault(); // 阻止手機網頁背景跟著滾動

                    const coords = getEventXY(e);
                    panX = coords.x - startX;
                    panY = coords.y - startY;
                    
                    applyZoomAndPan(); // 渲染位置並實時進行邊界檢查
                });

                // 放開滑鼠 / 斷開觸控
                $(document).on('mouseup mouseleave touchend touchcancel', function() {
                    if (!isDragging) return;
                    isDragging = false;
                    if (zoomLevel > 1.0) { $container.css('cursor', 'grab'); } 
                    else { $container.css('cursor', 'default'); }
                });
