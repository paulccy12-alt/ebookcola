<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>可樂旅遊迪士尼探險號旅遊手冊</title>
    
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/turn.js/3/turn.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        html, body {
            margin: 0;
            padding: 0;
            height: 100%;
            background: radial-gradient(circle, #444444 0%, #111111 100%);
            font-family: "Helvetica Neue", Helvetica, Arial, sans-serif;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        /* 主畫面區塊：允許內容過大時出現捲動軸 */
        .container {
            flex: 1;
            overflow: auto; 
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
            padding: 40px;
        }

        /* 💡 縮放核心：用來撐開滾動範圍的包裝盒 (尺寸會隨 JS 動態改變) */
        #book-wrapper {
            width: 848px;  /* A4 雙頁預設總寬 */
            height: 600px; /* 預設總高 */
            position: relative;
            margin: auto; /* 確保置中 */
        }

        /* 📄 A4 雙頁立體書本本體 */
        #flipbook {
            width: 848px;
            height: 600px;
            box-shadow: 0 30px 70px rgba(0, 0, 0, 0.6);
            display: none; 
            transition: transform 0.1s ease-out; /* 讓縮放更平滑 */
        }
        
        /* 📄 A4 單頁精準比例：424 x 600 */
        .page {
            width: 424px;
            height: 600px;
            background-color: white;
        }

        canvas {
            width: 100%;
            height: 100%;
            display: block;
        }

        /* 下方控制列 */
        .toolbar {
            height: 60px;
            background: rgba(20, 20, 20, 0.9);
            backdrop-filter: blur(10px);
            border-top: 1px solid rgba(255,255,255,0.1);
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 15px;
            color: #ccc;
            user-select: none;
            z-index: 10;
        }

        .btn {
            background: none;
            border: none;
            color: #ccc;
            font-size: 18px;
            cursor: pointer;
            padding: 10px 15px;
            border-radius: 5px;
            transition: all 0.2s ease;
        }

        .btn:hover {
            color: #fff;
            background: rgba(255, 255, 255, 0.1);
        }
        
        /* 縮放專用按鈕樣式 */
        .btn-zoom {
            color: #00adb5;
        }
        .btn-zoom:hover {
            color: #00fff6;
        }

        .page-info {
            font-size: 14px;
            letter-spacing: 1px;
            margin: 0 10px;
        }

        .divider {
            width: 1px;
            height: 20px;
            background: rgba(255,255,255,0.2);
        }

        #loading {
            position: absolute;
            color: #fff;
            font-size: 18px;
            text-align: center;
        }
        #loading i {
            font-size: 40px;
            margin-bottom: 15px;
            color: #00adb5;
        }
    </style>
</head>
<body>

    <div class="container">
        <div id="loading">
            <i class="fas fa-spinner fa-spin"></i>
            <div>載入中...</div>
        </div>
        
        <div id="book-wrapper">
            <div id="flipbook"></div>
        </div>
    </div>

    <div class="toolbar">
        <button class="btn" id="first-page" title="回到封面"><i class="fas fa-angles-left"></i></button>
        <button class="btn" id="prev-page" title="上一頁"><i class="fas fa-chevron-left"></i></button>
        
        <span class="page-info">第 <span id="current-page">1</span> 頁 / 共 <span id="total-pages">0</span> 頁</span>
        
        <button class="btn" id="next-page" title="下一頁"><i class="fas fa-chevron-right"></i></button>
        <button class="btn" id="last-page" title="移至封底"><i class="fas fa-angles-right"></i></button>
        
        <div class="divider"></div>
        
        <button class="btn btn-zoom" id="zoom-out" title="縮小"><i class="fas fa-magnifying-glass-minus"></i></button>
        <button class="btn btn-zoom" id="zoom-in" title="放大"><i class="fas fa-magnifying-glass-plus"></i></button>
        
        <div class="divider"></div>
        
        <button class="btn" id="fullscreen" title="全螢幕切換"><i class="fas fa-expand"></i></button>
    </div>

    <script>
        pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

        const pdfUrl = 'DLC.pdf'; 
        
        // 📐 為了符合直式 A4 (1:1.414)，重新精準計算的基礎尺寸
        const baseWidth = 848;  // 雙頁總寬 (424 * 2)
        const baseHeight = 600; // 總高

        pdfjsLib.getDocument(pdfUrl).promise.then(async function(pdf) {
            const totalPages = pdf.numPages;
            $('#total-pages').text(totalPages);
            const $flipbook = $('#flipbook');

            for (let pageNum = 1; pageNum <= totalPages; pageNum++) {
                const $pageDiv = $('<div class="page"></div>');
                if(pageNum === 1 || pageNum === totalPages) {
                    $pageDiv.addClass('hard'); 
                }
                const canvas = document.createElement('canvas');
                $pageDiv.append(canvas);
                $flipbook.append($pageDiv);

                const page = await pdf.getPage(pageNum);
                // 💡 將渲染倍率提高到 2.0，確保使用者放大看時文字依然清晰不模糊
                const viewport = page.getViewport({ scale: 2.0 }); 
                const context = canvas.getContext('2d');
                canvas.height = viewport.height;
                canvas.width = viewport.width;

                const renderContext = { canvasContext: context, viewport: viewport };
                await page.render(renderContext).promise;
            }

            $('#loading').hide();
            
            // 初始化 Turn.js (套用 A4 尺寸)
            $flipbook.show().turn({
                width: baseWidth,      
                height: baseHeight,     
                autoCenter: true,
                elevation: 50,   
                duration: 800,  
                gradients: true, 
                when: {
                    turned: function(event, page, view) {
                        $('#current-page').text(page);
                    }
                }
            });

            // --- 🔍 放大縮小核心邏輯 ---
            let zoomLevel = 1.0;
            const maxZoom = 2.0; // 最大放大 2 倍
            const minZoom = 1.0; // 最小 1 倍
            const zoomStep = 0.2; // 每次縮放的幅度

            function applyZoom() {
                // 1. 縮放實體書本
                $('#flipbook').css({
                    'transform': `scale(${zoomLevel})`,
                    'transform-origin': 'top left'
                });
                
                // 2. 同步撐大外層包裝盒，網頁才會正確產生對應大小的捲動軸
                $('#book-wrapper').css({
                    'width': (baseWidth * zoomLevel) + 'px',
                    'height': (baseHeight * zoomLevel) + 'px'
                });
            }

            $('#zoom-in').click(function() {
                if (zoomLevel < maxZoom) {
                    zoomLevel += zoomStep;
                    applyZoom();
                }
            });

            $('#zoom-out').click(function() {
                if (zoomLevel > minZoom) {
                    zoomLevel -= zoomStep;
                    applyZoom();
                }
            });

            // --- 其他控制功能 ---
            $('#first-page').click(function() { $flipbook.turn('page', 1); });
            $('#last-page').click(function() { $flipbook.turn('page', totalPages); });
            $('#prev-page').click(function() { $flipbook.turn('previous'); });
            $('#next-page').click(function() { $flipbook.turn('next'); });
            
            $('#fullscreen').click(function() {
                if (!document.fullscreenElement) {
                    document.documentElement.requestFullscreen();
                } else {
                    if (document.exitFullscreen) { document.exitFullscreen(); }
                }
            });

        }).catch(function(error) {
            $('#loading').html('<i class="fas fa-exclamation-triangle" style="color:ff4a4a;"></i><br>PDF 載入失敗');
            console.error(error);
        });
    </script>

</body>
</html>
